    + '<button class="otb-btn" onclick="otbRunComparison()">↺ Recalcular comparativa</button>'
    + '</div></div>';
}

function otbEditCell(input) {
  const side = input.dataset.side;
  const idx  = parseInt(input.dataset.idx);
  const field = input.dataset.field;
  const val = input.value;
  if (field === 'date') {
    OTB_STATE[side+'Data'][idx].date = val;
  } else {
    OTB_STATE[side+'Data'][idx][field] = parseFloat(val) || null;
  }
}

function otbRunComparison() {
  if (!OTB_STATE.beforeData || !OTB_STATE.beforeData.length || !OTB_STATE.afterData || !OTB_STATE.afterData.length) {
    otbShowError('Cargue y mapee ambos archivos antes de comparar'); return;
  }
  OTB_STATE.comparison = compareOTB(OTB_STATE.beforeData, OTB_STATE.afterData);
  OTB_STATE.metrics    = buildSummaryMetrics(OTB_STATE.comparison);
  OTB_STATE.recs       = generateRecommendations(OTB_STATE.metrics, OTB_STATE.comparison);

  otbRenderComparison();
  otbRenderCharts();
  otbRenderConsultant();

  // Switch to comparison tab
  document.querySelectorAll('.otb-tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.otb-sub-panel').forEach(function(p){ p.classList.remove('active'); });
  const compBtn = document.querySelector('.otb-tab-btn[data-tab="comparison"]');
  if (compBtn) compBtn.classList.add('active');
  const compPanel = document.getElementById('otb-panel-comparison');
  if (compPanel) compPanel.classList.add('active');
}

function otbRenderComparison() {
  const m = OTB_STATE.metrics;
  const rows = OTB_STATE.comparison;

  let alertClass = 'gray', alertText = 'Sin variaciones relevantes frente a la línea base.';
  if (m.general === 'Positivo') { alertClass='green'; alertText='✅ El OTB muestra crecimiento frente a la línea base.'; }
  else if (m.general === 'Negativo') { alertClass='red'; alertText='🔴 El OTB presenta caída en fechas críticas.'; }
  else if (m.general === 'Mixto') { alertClass='yellow'; alertText='⚠ El comportamiento es mixto. Revise fechas específicas.'; }

  const alertsArea = document.getElementById('otb-alerts-area');
  if (alertsArea) alertsArea.innerHTML = '<div class="otb-alert '+alertClass+'">'+alertText+'</div>';

  const kpis = [
    { label:'Fechas analizadas', val: m.total, cls:'', sub:'' },
    { label:'Fechas subieron',   val: m.up,    cls:'up',   sub: (m.total?((m.up/m.total)*100).toFixed(0):0)+'%' },
    { label:'Fechas bajaron',    val: m.down,  cls:'down', sub: (m.total?((m.down/m.total)*100).toFixed(0):0)+'%' },
    { label:'Fechas estables',   val: m.stable,cls:'',     sub: '' },
    { label:'Var. prom. Ocup.',  val: m.avgOcc!==null ? fmtPct(m.avgOcc) : 'N/D', cls: m.avgOcc>0?'up':m.avgOcc<0?'down':'', sub:'pp' },
    { label:'Var. prom. RevPAR', val: m.avgRevpar!==null ? fmtCOP(m.avgRevpar) : 'N/D', cls: m.avgRevpar>0?'up':m.avgRevpar<0?'down':'', sub:'' },
  ];
  const kpiArea = document.getElementById('otb-kpi-area');
  if (kpiArea) kpiArea.innerHTML = '<div class="otb-kpi-grid">'
    + kpis.map(function(k){ return '<div class="otb-kpi '+k.cls+'"><div class="otb-kpi-label">'+k.label+'</div><div class="otb-kpi-value">'+k.val+'</div><div class="otb-kpi-sub">'+k.sub+'</div></div>'; }).join('')
    + '</div>';

  const filtersArea = document.getElementById('otb-filters-area');
  if (filtersArea) filtersArea.innerHTML = '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center">'
    + '<span style="font-size:.74rem;font-weight:700;color:var(--gray4)">Filtrar:</span>'
    + '<button class="otb-btn" data-filter="all" onclick="otbFilter(\'all\',this)" style="background:var(--gold);color:#fff">Todas</button>'
    + '<button class="otb-btn" data-filter="positive" onclick="otbFilter(\'positive\',this)">⬆ Subieron</button>'
    + '<button class="otb-btn" data-filter="negative" onclick="otbFilter(\'negative\',this)">⬇ Bajaron</button>'
    + '<button class="otb-btn" data-filter="stable" onclick="otbFilter(\'stable\',this)">⚫ Estables</button>'
    + '<button class="otb-btn" data-filter="mixed" onclick="otbFilter(\'mixed\',this)">↔ Mixtas</button>'
    + '</div>';

  otbRenderTable(rows);
}

function otbFilter(filter, btn) {
  document.querySelectorAll('[data-filter]').forEach(function(b){ b.style.background=''; b.style.color=''; });
  btn.style.background = 'var(--gold)'; btn.style.color = '#fff';
  const rows = filter === 'all' ? OTB_STATE.comparison : OTB_STATE.comparison.filter(function(r){ return r.status === filter; });
  otbRenderTable(rows);
}

function otbRenderTable(rows) {
  let html = '<div class="otb-table-wrap"><table class="otb-table"><thead><tr>'
    + '<th>Fecha</th>'
    + '<th>Ocup Antes</th><th>Ocup Dsp</th><th>Var Ocup</th><th></th>'
    + '<th>Hab Antes</th><th>Hab Dsp</th><th>Var Hab</th><th></th>'
    + '<th>ADR Antes</th><th>ADR Dsp</th><th>Var ADR</th><th></th>'
    + '<th>RevPAR Ant</th><th>RevPAR Dsp</th><th>Var RevPAR</th><th></th>'
    + '<th>Estado</th><th>Nota</th>'
    + '</tr></thead><tbody>';

  rows.forEach(function(r) {
    const statusLabel = { positive:'✅ Subió', negative:'🔴 Bajó', stable:'⚫ Estable', mixed:'↔ Mixto', new:'🆕 Nueva', missing:'❓ Sin dato' }[r.status] || r.status;
    const fmt1 = function(v){ return (v !== null && v !== undefined) ? v.toFixed(1) : '—'; };
    const fmt0 = function(v){ return (v !== null && v !== undefined) ? fmtCOP(v) : '—'; };

    html += '<tr>'
      + '<td style="font-weight:700;white-space:nowrap">'+r.date+'</td>'
      + '<td>'+fmt1(r.b&&r.b.occ)+'%</td><td>'+fmt1(r.a&&r.a.occ)+'%</td>'
      + '<td>'+(r.occ&&r.occ.abs!==null ? fmtPct(r.occ.abs,1)+' pp' : '—')+'</td><td>'+(r.occ ? dirIcon(r.occ.dir) : '')+'</td>'
      + '<td>'+fmt1(r.b&&r.b.rooms)+'</td><td>'+fmt1(r.a&&r.a.rooms)+'</td>'
      + '<td>'+(r.rooms&&r.rooms.abs!==null ? (r.rooms.abs>0?'+':'')+r.rooms.abs.toFixed(0) : '—')+'</td><td>'+(r.rooms ? dirIcon(r.rooms.dir) : '')+'</td>'
      + '<td>'+fmt0(r.b&&r.b.adr)+'</td><td>'+fmt0(r.a&&r.a.adr)+'</td>'
      + '<td>'+(r.adr&&r.adr.abs!==null ? fmtCOP(r.adr.abs) : '—')+'</td><td>'+(r.adr ? dirIcon(r.adr.dir) : '')+'</td>'
      + '<td>'+fmt0(r.b&&r.b.revpar)+'</td><td>'+fmt0(r.a&&r.a.revpar)+'</td>'
      + '<td>'+(r.revpar&&r.revpar.abs!==null ? fmtCOP(r.revpar.abs) : '—')+'</td><td>'+(r.revpar ? dirIcon(r.revpar.dir) : '')+'</td>'
      + '<td style="white-space:nowrap">'+statusLabel+'</td>'
      + '<td style="font-size:.68rem;color:#666;max-width:120px">'+(r.note||'')+'</td>'
      + '</tr>';
  });
  html += '</tbody></table></div>';
  const tArea = document.getElementById('otb-table-area');
  if (tArea) tArea.innerHTML = html;
}

function otbRenderCharts() {
  if (!OTB_STATE.comparison) return;
  const rows = OTB_STATE.comparison.filter(function(r){ return r.b && r.a; });
  const labels = rows.map(function(r){ return r.date.slice(5); });
  const area = document.getElementById('otb-charts-area');
  if (!area) return;
  area.innerHTML = '';

  const mkCanvas = function(id, title) {
    const box = document.createElement('div'); box.className='otb-chart-box';
    box.innerHTML = '<div class="otb-chart-title">'+title+'</div><canvas id="'+id+'"></canvas>';
    area.appendChild(box); return id;
  };

  Object.values(OTB_STATE.charts).forEach(function(c){ try { c.destroy(); } catch(e){} });
  OTB_STATE.charts = {};

  const mkLine = function(id, title, beforeArr, afterArr) {
    const cId = mkCanvas(id, title);
    OTB_STATE.charts[id] = new Chart(document.getElementById(cId), {
      type:'line',
      data:{ labels: labels, datasets:[
        { label:'Antes', data:beforeArr, borderColor:'#e8c88a', backgroundColor:'rgba(232,200,138,.15)', tension:.3, fill:true },
        { label:'Después', data:afterArr, borderColor:'#1a6e3c', backgroundColor:'rgba(26,110,60,.1)', tension:.3, fill:true }
      ]},
      options:{ responsive:true, plugins:{ legend:{position:'top'} }, scales:{ y:{beginAtZero:false} } }
    });
  };

  mkLine('ch-occ','Ocupación % — Antes vs Después', rows.map(function(r){return r.b.occ;}), rows.map(function(r){return r.a.occ;}));
  mkLine('ch-revpar','RevPAR — Antes vs Después', rows.map(function(r){return r.b.revpar;}), rows.map(function(r){return r.a.revpar;}));
  mkLine('ch-adr','ADR — Antes vs Después', rows.map(function(r){return r.b.adr;}), rows.map(function(r){return r.a.adr;}));

  const barId = mkCanvas('ch-var','Variación diaria de Ocupación (pp)');
  OTB_STATE.charts['ch-var'] = new Chart(document.getElementById(barId), {
    type:'bar',
    data:{ labels: labels, datasets:[{ label:'Var. Ocup (pp)', data:rows.map(function(r){return r.occ&&r.occ.abs!==null?r.occ.abs:0;}),
      backgroundColor: rows.map(function(r){ return (r.occ&&r.occ.abs>=0) ? 'rgba(26,110,60,.7)' : 'rgba(200,0,0,.6)'; }) }]},
    options:{ responsive:true, plugins:{legend:{display:false}} }
  });

  const m = OTB_STATE.metrics;
  const doId = mkCanvas('ch-dist','Distribución de resultados');
  OTB_STATE.charts['ch-dist'] = new Chart(document.getElementById(doId), {
    type:'doughnut',
    data:{ labels:['Subieron','Bajaron','Estables/Mixtos'], datasets:[{
      data:[m.up, m.down, m.stable],
      backgroundColor:['#1a6e3c','#c00','#999']
    }]},
    options:{ responsive:true, plugins:{ legend:{position:'bottom'} } }
  });
}

function otbRenderConsultant() {
  const recs = OTB_STATE.recs || [];
  const m = OTB_STATE.metrics;
  const area = document.getElementById('otb-consultant-area');
  if (!area) return;
  if (!m) { area.innerHTML='<p style="color:var(--gray3);padding:20px">Ejecute la comparativa primero.</p>'; return; }

  let html = '<div class="otb-card"><div class="otb-card-title">Diagnóstico general</div>'
    + '<div class="otb-alert '+(m.general==='Positivo'?'green':m.general==='Negativo'?'red':'yellow')+'">'
    + 'Estado del OTB: <strong>'+m.general+'</strong> · '+m.up+' fechas mejoraron · '+m.down+' fechas cayeron · Var. prom. RevPAR: '+(m.avgRevpar!==null?fmtCOP(m.avgRevpar):'N/D')
    + '</div></div>';

  html += '<div class="otb-card"><div class="otb-card-title">Recomendaciones estratégicas ('+recs.length+')</div>';
  recs.forEach(function(r) {
    html += '<div class="otb-rec '+r.type+'">'
      + '<div class="otb-rec-title">'+r.title+'</div>'
      + '<div class="otb-rec-body">'+r.body+'</div>'
      + '<span class="otb-rec-priority '+r.priority+'">'+ ({high:'Alta',medium:'Media',low:'Baja'}[r.priority]||r.priority) +'</span>'
      + '</div>';
  });
  html += '</div>';

  const topUp   = (OTB_STATE.comparison||[]).filter(function(r){return r.revpar&&r.revpar.abs!==null;}).slice().sort(function(a,b){return (b.revpar.abs||0)-(a.revpar.abs||0);}).slice(0,5);
  const topDown = (OTB_STATE.comparison||[]).filter(function(r){return r.revpar&&r.revpar.abs!==null;}).slice().sort(function(a,b){return (a.revpar.abs||0)-(b.revpar.abs||0);}).slice(0,5);

  html += '<div class="otb-card"><div class="otb-card-title">Top 5 mejores fechas (RevPAR)</div><table class="otb-hist-table"><thead><tr><th>Fecha</th><th>RevPAR Antes</th><th>RevPAR Después</th><th>Variación</th></tr></thead><tbody>';
  topUp.forEach(function(r){ html += '<tr><td>'+r.date+'</td><td>'+fmtCOP(r.b&&r.b.revpar)+'</td><td>'+fmtCOP(r.a&&r.a.revpar)+'</td><td class="ind-up">+'+fmtCOP(r.revpar.abs)+'</td></tr>'; });
  html += '</tbody></table></div>';

  html += '<div class="otb-card"><div class="otb-card-title">Top 5 peores fechas (RevPAR)</div><table class="otb-hist-table"><thead><tr><th>Fecha</th><th>RevPAR Antes</th><th>RevPAR Después</th><th>Variación</th></tr></thead><tbody>';
  topDown.forEach(function(r){ html += '<tr><td>'+r.date+'</td><td>'+fmtCOP(r.b&&r.b.revpar)+'</td><td>'+fmtCOP(r.a&&r.a.revpar)+'</td><td class="ind-down">'+fmtCOP(r.revpar.abs)+'</td></tr>'; });
  html += '</tbody></table></div>';

  area.innerHTML = html;
}

function otbSaveToHistory() {
  if (!OTB_STATE.metrics) { otbShowError('No hay comparativa activa para guardar'); return; }
  const m = OTB_STATE.metrics;
  const entry = {
    id: Date.now(),
    hotel: currentHotel,
    month: new Date().toLocaleDateString('es-CO',{year:'numeric',month:'long'}),
    date: new Date().toLocaleDateString('es-CO'),
    total: m.total, up: m.up, down: m.down, stable: m.stable,
    avgOcc: m.avgOcc, avgAdr: m.avgAdr, avgRevpar: m.avgRevpar,
    general: m.general
  };
  OTB_STATE.history.unshift(entry);
  localStorage.setItem('otb_history', JSON.stringify(OTB_STATE.history.slice(0,50)));
  otbRenderHistory();
  alert('✓ Guardado en el histórico mensual');
}

function otbRenderHistory() {
  const area = document.getElementById('otb-history-area');
  if (!area) return;
  if (!OTB_STATE.history.length) {
    area.innerHTML = '<p style="color:var(--gray3);padding:20px">No hay comparativas guardadas aún. Ejecute una comparativa y presione "Guardar en histórico".</p>';
    return;
  }
  let html = '<div class="otb-card"><div class="otb-card-title">Histórico de comparativas OTB ('+OTB_STATE.history.length+')</div>'
    + '<div class="otb-table-wrap"><table class="otb-hist-table"><thead><tr>'
    + '<th>Fecha análisis</th><th>Hotel</th><th>Mes</th><th>Fechas</th><th>Subieron</th><th>Bajaron</th><th>Estables</th>'
    + '<th>Var. Ocup</th><th>Var. ADR</th><th>Var. RevPAR</th><th>Estado</th><th></th>'
    + '</tr></thead><tbody>';
  OTB_STATE.history.forEach(function(e) {
    const stColor = e.general==='Positivo'?'#1a6e3c':e.general==='Negativo'?'#c00':'#856404';
    html += '<tr>'
      + '<td>'+e.date+'</td><td>'+e.hotel+'</td><td>'+e.month+'</td>'
      + '<td>'+e.total+'</td>'
      + '<td style="color:#1a6e3c;font-weight:700">'+e.up+'</td>'
      + '<td style="color:#c00;font-weight:700">'+e.down+'</td>'
      + '<td>'+e.stable+'</td>'
      + '<td>'+(e.avgOcc!==null&&e.avgOcc!==undefined?fmtPct(e.avgOcc):'N/D')+'</td>'
      + '<td>'+(e.avgAdr!==null&&e.avgAdr!==undefined?fmtCOP(e.avgAdr):'N/D')+'</td>'
      + '<td>'+(e.avgRevpar!==null&&e.avgRevpar!==undefined?fmtCOP(e.avgRevpar):'N/D')+'</td>'
      + '<td style="color:'+stColor+';font-weight:700">'+e.general+'</td>'
      + '<td><button class="otb-btn danger" style="padding:2px 8px;font-size:.65rem" onclick="otbDeleteHistory('+e.id+')">✕</button></td>'
      + '</tr>';
  });
  html += '</tbody></table></div></div>';
  area.innerHTML = html;
}

function otbDeleteHistory(id) {
  OTB_STATE.history = OTB_STATE.history.filter(function(e){ return e.id !== id; });
  localStorage.setItem('otb_history', JSON.stringify(OTB_STATE.history));
  otbRenderHistory();
}

function otbExportExcel() {
  if (!OTB_STATE.comparison) { otbShowError('No hay datos para exportar'); return; }
  const m = OTB_STATE.metrics;
  const wb = XLSX.utils.book_new();

  const resumen = [
    ['Revenue Master Dashboard — GEH Suites'],
    ['Comparativa OTB', '', currentHotel],
    ['Fecha exportación', new Date().toLocaleDateString('es-CO')],
    [],
    ['Indicador','Valor'],
    ['Total fechas', m.total], ['Fechas subieron', m.up], ['Fechas bajaron', m.down], ['Fechas estables', m.stable],
    ['Var. prom. Ocupación (pp)', m.avgOcc!==null?m.avgOcc.toFixed(2):'N/D'],
    ['Var. prom. ADR', m.avgAdr!==null?m.avgAdr.toFixed(0):'N/D'],
    ['Var. prom. RevPAR', m.avgRevpar!==null?m.avgRevpar.toFixed(0):'N/D'],
    ['Estado general', m.general]
  ];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(resumen), 'Resumen OTB');

  const comp = [['Fecha','Ocup Antes','Ocup Después','Var Ocup','Hab Antes','Hab Después','Var Hab','ADR Antes','ADR Después','Var ADR','RevPAR Antes','RevPAR Después','Var RevPAR','Estado']];
  OTB_STATE.comparison.forEach(function(r) {
    comp.push([
      r.date,
      r.b&&r.b.occ!==null?r.b.occ.toFixed(1):'', r.a&&r.a.occ!==null?r.a.occ.toFixed(1):'', r.occ&&r.occ.abs!==null?r.occ.abs.toFixed(1):'',
      r.b&&r.b.rooms!==null?r.b.rooms:'', r.a&&r.a.rooms!==null?r.a.rooms:'', r.rooms&&r.rooms.abs!==null?r.rooms.abs.toFixed(0):'',
      r.b&&r.b.adr!==null?r.b.adr.toFixed(0):'', r.a&&r.a.adr!==null?r.a.adr.toFixed(0):'', r.adr&&r.adr.abs!==null?r.adr.abs.toFixed(0):'',
      r.b&&r.b.revpar!==null?r.b.revpar.toFixed(0):'', r.a&&r.a.revpar!==null?r.a.revpar.toFixed(0):'', r.revpar&&r.revpar.abs!==null?r.revpar.abs.toFixed(0):'',
      r.status
    ]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(comp), 'Comparativa Día a Día');

  const recs = [['Tipo','Título','Descripción','Prioridad']];
  (OTB_STATE.recs||[]).forEach(function(r){ recs.push([r.type, r.title, r.body, r.priority]); });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(recs), 'Recomendaciones Revenue');

  XLSX.writeFile(wb, 'OTB_Comparativa_'+currentHotel.replace(/ /g,'_')+'_'+new Date().toISOString().slice(0,10)+'.xlsx');
}
