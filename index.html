function otbSaveManual(side) {
  const fromEl   = document.getElementById('otbm-'+side+'-from');
  const toEl     = document.getElementById('otbm-'+side+'-to');
  const adrEl    = document.getElementById('otbm-'+side+'-adr');
  const revparEl = document.getElementById('otbm-'+side+'-revpar');
  const dailyEl  = document.getElementById('otbm-'+side+'-daily');

  const from = fromEl?.value;
  if (!from) { otbShowError('Ingrese la fecha de inicio del período.'); return; }

  const dailyRaw = dailyEl?.value.trim();
  if (!dailyRaw) { otbShowError('Ingrese al menos la secuencia de ocupación diaria (ej: 76,76,91,74,65...).'); return; }

  const dailyVals = dailyRaw.split(/[,;\n\s]+/).map(v => parseFloat(v.trim())).filter(v => !isNaN(v));
  if (!dailyVals.length) { otbShowError('No se detectaron valores numéricos de ocupación. Separe con comas: 76, 76, 91, 74...'); return; }

  const startD = new Date(from);
  const rows = dailyVals.map(function(occ, i) {
    const d = new Date(startD); d.setDate(d.getDate()+i);
    return { date: d.toISOString().split('T')[0], dayOfMonth: d.getDate(), periodIndex: i,
             occ: occ, rooms: null, adr: null, revpar: null, revenue: null };
  });

  const avgOcc = dailyVals.reduce(function(s,v){return s+v;},0) / dailyVals.length;
  const toDate = toEl?.value || rows[rows.length-1].date;
  OTB_STATE[side+'Data'] = rows;
  OTB_STATE[side+'Summary'] = {
    label: (side==='before'?'Corte Base':'Corte Actual') + ' · ' + from.slice(0,7),
    startDate: from, endDate: toDate,
    occ: avgOcc,
    adr: parseFloat(adrEl?.value)||null,
    revpar: parseFloat(revparEl?.value)||null
  };
  OTB_STATE[side+'Source'] = 'manual';

  const fnEl = document.getElementById('otb-fname-'+side);
  const dropEl = document.getElementById('otb-drop-'+side);
  if (fnEl) fnEl.textContent = '✓ Manual · '+from+' · '+dailyVals.length+' días · Occ prom. '+avgOcc.toFixed(1)+'%';
  if (dropEl) dropEl.classList.add('has-file');
  document.getElementById('otb-manual-'+side).classList.remove('open');

  if (OTB_STATE.comparison) markAnalysisAsStale();
  otbCheckBothLoaded();
}

function otbCheckBothLoaded() {
  const hasBefore = OTB_STATE.beforeData !== null || OTB_STATE.beforeSummary !== null;
  const hasAfter  = OTB_STATE.afterData  !== null || OTB_STATE.afterSummary  !== null;
  if (hasBefore && hasAfter) {
    const cmpBtn = document.getElementById('otb-compare-btn-area');
    if (cmpBtn) cmpBtn.style.display = 'block';
    if (OTB_STATE.analysisStatus !== 'stale') otbSetStatus('loaded');
  } else {
    if (OTB_STATE.analysisStatus !== 'stale') otbSetStatus('pending');
  }
  // Show replace buttons for loaded sides
  ['before','after'].forEach(function(s) {
    const has = OTB_STATE[s+'Data'] || OTB_STATE[s+'Summary'];
    const replBtn = document.getElementById('otb-replace-'+s+'-btn');
    if (replBtn) replBtn.style.display = has ? '' : 'none';
  });
}

// ── OCR ENGINE ────────────────────────────────────────────────────────────────
function otbProcessImageOCR(file, side) {
  const fnEl  = document.getElementById('otb-fname-'+side);
  const dropEl = document.getElementById('otb-drop-'+side);
  const label = side === 'before' ? 'OTB ANTES' : 'OTB DESPUÉS';

  if (fnEl) fnEl.textContent = '⏳ Leyendo imagen con OCR...';
  otbSetStatus('processing');

  // ── Helper: open manual form and pre-fill what we know ──────────────────
  function openManualPrefilled(startDate, endDate, occSeq, adr, revpar) {
    var e2 = { stopPropagation: function(){} };
    otbOpenManual(e2, side, true);
    var fromEl = document.getElementById('otbm-'+side+'-from');
    var toEl   = document.getElementById('otbm-'+side+'-to');
    var adrEl  = document.getElementById('otbm-'+side+'-adr');
    var rpEl   = document.getElementById('otbm-'+side+'-revpar');
    var seq    = document.getElementById('otbm-'+side+'-daily');
    if (fromEl && startDate) fromEl.value = startDate;
    if (toEl   && endDate)   toEl.value   = endDate;
    if (adrEl  && adr)       adrEl.value  = adr;
    if (rpEl   && revpar)    rpEl.value   = revpar;
    if (seq    && occSeq && occSeq.length) seq.value = occSeq.join(', ');
  }

  if (typeof Tesseract === 'undefined') {
    if (fnEl) fnEl.textContent = '⚠ OCR no disponible — ingrese datos manualmente';
    openManualPrefilled(null, null, [], null, null);
    return;
  }

  Tesseract.recognize(file, 'spa+eng', {
    logger: function(m) {
      if (m.status === 'recognizing text' && fnEl) {
        fnEl.textContent = '⏳ OCR: ' + Math.round((m.progress||0)*100) + '%';
      }
    }
  }).then(function(result) {
    var text = result.data.text;

    // 1. Extract summary KPIs (start date, end date, global occ/ADR/RevPAR)
    var summary = otbExtractSummaryFromOCR(text);
    OTB_STATE[side+'Source'] = 'image';
    if (summary) OTB_STATE[side+'Summary'] = summary;

    // 2. Try to extract a daily occupancy sequence from the text
    //    (only works if the image is a DATA TABLE, not a bar chart)
    var tableRows = otbParseOCRText(text);
    var validTableRows = tableRows.filter(function(r){ return r.occ !== null && r.occ >= 0 && r.occ <= 100; });

    // 3. Also try extracting a bare sequence of numbers in 0-100 range
    //    (works for images that show occupancy labels on bars)
    var occSeqFromText = otbExtractOccSequence(text);

    var startDate = summary && summary.startDate ? summary.startDate : null;
    var endDate   = summary && summary.endDate   ? summary.endDate   : null;
    var adr       = summary && summary.adr       ? summary.adr       : null;
    var revpar    = summary && summary.revpar     ? summary.revpar    : null;

    if (validTableRows.length >= 10) {
      // Best case: OCR found a full data table — accept directly
      OTB_STATE[side+'Data'] = tableRows;
      OTB_STATE[side+'Headers'] = ['Fecha','Ocup%','Hab.Vendidas','ADR','RevPAR','Ingresos'];
      OTB_STATE[side+'Mapping'] = { date:'Fecha', occ:'Ocup%', rooms:'Hab.Vendidas', adr:'ADR', revpar:'RevPAR', revenue:'Ingresos' };
      if (fnEl) fnEl.textContent = '✓ ' + file.name + ' · ' + validTableRows.length + ' días detectados vía OCR (tabla)';
      if (dropEl) dropEl.classList.add('has-file');
      otbCheckBothLoaded();
      return;
    }

    // For bar chart images (most OTB dashboards): OCR cannot read bar heights.
    // Route to manual entry, pre-filling whatever we could extract.
    var prefillSeq = occSeqFromText.length >= 5 ? occSeqFromText
                   : validTableRows.map(function(r){ return r.occ; });

    var infoMsg = '';
    if (startDate) infoMsg += '📅 Período detectado: ' + startDate + (endDate ? ' → ' + endDate : '') + '  ';
    if (prefillSeq.length >= 5) infoMsg += '📊 ' + prefillSeq.length + ' valores de ocupación detectados y pre-cargados  ';

    if (fnEl) {
      fnEl.textContent = infoMsg
        ? '⚡ ' + file.name + ' — ' + (startDate ? startDate : '') + ' · Complete la secuencia diaria abajo'
        : '⚠ ' + file.name + ' — OCR no pudo leer los datos diarios · Ingrese manualmente';
    }

    openManualPrefilled(startDate, endDate, prefillSeq, adr, revpar);

    // Show info/instruction in error area (not red error — informational)
    var errEl = document.getElementById('otb-errors');
    if (errEl) {
      var infoColor = prefillSeq.length >= 5 ? '#d4edda' : '#fff3cd';
      var infoBorder = prefillSeq.length >= 5 ? '#28a745' : '#ffc107';
      var infoTextColor = prefillSeq.length >= 5 ? '#155724' : '#856404';
      errEl.innerHTML = '<div style="background:'+infoColor+';border:1px solid '+infoBorder+';color:'+infoTextColor+';padding:12px 16px;border-radius:8px;font-size:.8rem;line-height:1.6">'
        + (infoMsg ? '✅ ' + infoMsg.trim() + '<br>' : '')
        + (startDate ? '' : '⚠ No se detectó la fecha de inicio. Ingrésela manualmente.<br>')
        + '<strong>Ingrese la secuencia de ocupación diaria</strong> (un número por día, separados por comas) '
        + 'y haga clic en "Guardar y calcular pickup".<br>'
        + (prefillSeq.length >= 5
            ? 'Se pre-cargaron <strong>'+prefillSeq.length+'</strong> valores. Verifique que sean correctos antes de guardar.'
            : 'Ejemplo: <code style="background:rgba(0,0,0,.08);padding:1px 5px;border-radius:3px">76, 76, 91, 74, 65, 76, 87, 91, 87, 76…</code>')
        + '</div>';
      setTimeout(function(){ if(errEl) errEl.innerHTML=''; }, 30000);
    }

  }).catch(function(err) {
    if (fnEl) fnEl.textContent = '⚠ Error OCR — ingrese datos manualmente';
    openManualPrefilled(null, null, [], null, null);
  });
}

// ── OCR OCCUPANCY SEQUENCE EXTRACTOR ──────────────────────────────────────────
// Extracts a sequence of integer/decimal values in range 0-100 that appear
// as occupancy labels (e.g. "76 76 91 74 65" printed on or near the bars)
function otbExtractOccSequence(text) {
  // Look for lines that appear to be data rows: multiple numbers in 0-100 range
  // with no date and no huge numbers (ADR/RevPAR)
  var lines = text.split('\n').map(function(l){ return l.trim(); }).filter(Boolean);
  var allCandidates = [];

  // Strategy 1: find lines that are mostly numbers in 0-100 (chart label rows)
  lines.forEach(function(line) {
    // Skip lines with dates or large numbers
    if (/\d{4}/.test(line)) return; // has year
    if (/\d{6,}/.test(line.replace(/[\s,\.]/g,''))) return; // has large number

    var nums = [];
    var re = /\b(\d{1,2}(?:[.,]\d{1,2})?)\b/g;
    var m;
    while ((m = re.exec(line)) !== null) {
      var v = parseFloat(m[1].replace(',','.'));
      if (v >= 1 && v <= 100) nums.push(v);
    }
    // If line has 3+ numbers all in 0-100, it looks like an occupancy row
    if (nums.length >= 3) allCandidates = allCandidates.concat(nums);
  });

  // Strategy 2: scan the whole text for a sequence of standalone integers in 0-100
  // that appear in close proximity (likely the bar labels)
  var seqMatch = [];
  var reSeq = /\b([1-9]\d?|100)\b/g;
  var sm;
  var fullText = text.replace(/\n/g, ' ');
  // Remove date-like patterns first
  var cleaned = fullText
    .replace(/\d{4}[-\/]\d{2}[-\/]\d{2}/g, ' ')
    .replace(/\d{1,2}[-\/]\d{1,2}[-\/]\d{2,4}/g, ' ')
    .replace(/\d{5,}/g, ' ');

  while ((sm = reSeq.exec(cleaned)) !== null) {
    var v2 = parseInt(sm[1]);
    if (v2 >= 1 && v2 <= 100) seqMatch.push(v2);
  }

  // Prefer Strategy 1 if it found enough values; otherwise use Strategy 2
  var candidates = allCandidates.length >= 7 ? allCandidates : seqMatch;

  // Deduplicate excessively repeated consecutive values
  if (candidates.length > 40) {
    var deduped = [];
    candidates.forEach(function(v, i) {
      if (i === 0 || !(v === candidates[i-1] && v === candidates[i-2])) deduped.push(v);
    });
    candidates = deduped;
  }

  return candidates.slice(0, 35); // max 35 days
}

function otbExtractSummaryFromOCR(text) {
  // Extract KPI values like "72,39%" or "195.545,88" or "195,545.88"
  var reOcc = /(?:ocupaci[oó]n|occ(?:upancy)?|ocup)[^\d]*(\d{1,3}[,\.]\d{1,2})\s*%/i;
  var reADR = /(?:adr|tarifa\s*promedio|average\s*daily)[^\d]*(\d{1,3}(?:[,\.]\d{3})*[,\.]\d{2})/i;
  var reRevPAR = /(?:revpar|rev\s*par)[^\d]*(\d{1,3}(?:[,\.]\d{3})*[,\.]\d{2})/i;
  var reDateRange = /(\d{1,2})[\/\-\s]+(?:de\s+)?([A-Za-záéíóúü]+)[\/\-\s,]+(\d{4})/gi;

  function parseNum(s) {
    if (!s) return null;
    // Handle both 72,39 and 72.39 and 195,545.88 and 195.545,88
    s = s.replace(/\./g,'').replace(',','.');
    return parseFloat(s);
  }

  var occ=null, adr=null, revpar=null, label='';
  var m;
  m = text.match(reOcc); if (m) occ = parseNum(m[1]);
  m = text.match(reADR); if (m) adr = parseNum(m[1]);
  m = text.match(reRevPAR); if (m) revpar = parseNum(m[1]);

  // Try to find month/year label
  var MONTHS = {enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,julio:7,agosto:8,septiembre:9,octubre:10,noviembre:11,diciembre:12,
    jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
  var reMonthYear = /\b(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|octubre|noviembre|diciembre|jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\w*[\s,]+(\d{4})\b/i;
  m = text.match(reMonthYear);
  if (m) {
    var mo = MONTHS[m[1].toLowerCase().substring(0,3)] || MONTHS[m[1].toLowerCase()];
    label = m[1].charAt(0).toUpperCase()+m[1].slice(1).toLowerCase()+' '+m[2];
  }

  // Detect Desde / Hasta date range
  var startDate = null, endDate = null;
  var reDesde = /desde\s*[:\-]?\s*(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/i;
  var reHasta = /hasta\s*[:\-]?\s*(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/i;
  var mD = text.match(reDesde);
  var mH = text.match(reHasta);
  if (mD) {
    var yr = mD[3].length === 2 ? '20'+mD[3] : mD[3];
    startDate = yr+'-'+mD[2].padStart(2,'0')+'-'+mD[1].padStart(2,'0');
  }
  if (mH) {
    var yr2 = mH[3].length === 2 ? '20'+mH[3] : mH[3];
    endDate = yr2+'-'+mH[2].padStart(2,'0')+'-'+mH[1].padStart(2,'0');
  }

  if (occ !== null || adr !== null || revpar !== null) {
    return { occ: occ, adr: adr, revpar: revpar, label: label || 'Período desconocido', startDate: startDate, endDate: endDate };
  }
  return null;
}

// ── COMPARISON MODE FUNCTIONS ─────────────────────────────────────────────────
function extractDayNum(row) {
  var d = row.date || row.Fecha || '';
  var m = d.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (m) return parseInt(m[3]);
  m = d.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if (m) return parseInt(m[1]);
  if (row.dayOfMonth) return parseInt(row.dayOfMonth);
  if (row.periodIndex !== undefined) return row.periodIndex + 1;
  return null;
}

function compareOTBByDayOfMonth(before, after) {
  var afterByDay = {};
  after.forEach(function(r){ var d=extractDayNum(r); if(d!==null) afterByDay[d]=r; });
  var results=[], matched=0, unmatched=0;
  before.forEach(function(rb){
    var d = extractDayNum(rb);
    var ra = d !== null ? afterByDay[d] : null;
    if (ra) { matched++; results.push(buildPickupRow(d, rb, ra, null)); }
    else { unmatched++; }
  });
  // Also add after-only days (new pickup)
  after.forEach(function(ra){
    var d = extractDayNum(ra);
    var hasMatch = before.some(function(rb){ return extractDayNum(rb)===d; });
    if (!hasMatch) { results.push(buildPickupRow(d, null, ra, null)); }
  });
  results.sort(function(a,b){ return a.day - b.day; });
  return { rows: results, matched: matched, unmatched: unmatched, mode:'dayOfMonth' };
}

function compareOTBByPeriodIndex(before, after) {
  var results=[], matched=0;
  var len = Math.min(before.length, after.length);
  for (var i=0; i<len; i++) {
    results.push(buildPickupRow(i+1, before[i], after[i], null));
    matched++;
  }
  return { rows: results, matched: matched, unmatched: Math.abs(before.length-after.length), mode:'periodIndex' };
}

function compareOTBMonthlySummary(bSum, aSum) {
  if (!bSum || !aSum) return null;
  function delta(a,b){ return (a!=null&&b!=null) ? a-b : null; }
  function pct(a,b){ return (a!=null&&b!=null&&b!==0) ? ((a-b)/Math.abs(b))*100 : null; }
  var dOcc = delta(aSum.occ, bSum.occ);
  var dADR = delta(aSum.adr, bSum.adr);
  var dRevPAR = delta(aSum.revpar, bSum.revpar);
  return {
    before: bSum, after: aSum,
    deltaOcc: dOcc, deltaADR: dADR, deltaRevPAR: dRevPAR,
    pctOcc: pct(aSum.occ,bSum.occ), pctADR: pct(aSum.adr,bSum.adr), pctRevPAR: pct(aSum.revpar,bSum.revpar),
    general: dRevPAR>0?'Positivo':dRevPAR<0?'Negativo':'Estable'
  };
}

  var html = '<div class="otb-card">'
    + '<div class="otb-card-title">📊 Comparativa Resumen Mensual</div>'

    + '<th>Métrica</th><th>Base ('+msum.before.label+')</th><th>Actual ('+msum.after.label+')</th><th>Variación</th></tr></thead><tbody>';
  if (msum.before.occ!=null||msum.after.occ!=null) {
    html += '<tr><td>Ocupación</td><td>'+(msum.before.occ!=null?msum.before.occ.toFixed(2)+'%':'N/D')+'</td>'
      +'<td>'+(msum.after.occ!=null?msum.after.occ.toFixed(2)+'%':'N/D')+'</td>'
      +'<td class="'+cls(msum.deltaOcc)+'">'+fmtD(msum.deltaOcc,'pp')+'</td></tr>';
  }
  if (msum.before.adr!=null||msum.after.adr!=null) {
    html += '<tr><td>ADR</td><td>'+(msum.before.adr!=null?fmtCOP(msum.before.adr):'N/D')+'</td>'
      +'<td>'+(msum.after.adr!=null?fmtCOP(msum.after.adr):'N/D')+'</td>'
      +'<td class="'+cls(msum.deltaADR)+'">'+fmtD(msum.deltaADR,'COP')+'</td></tr>';
  }
  if (msum.before.revpar!=null||msum.after.revpar!=null) {
    html += '<tr><td>RevPAR</td><td>'+(msum.before.revpar!=null?fmtCOP(msum.before.revpar):'N/D')+'</td>'
      +'<td>'+(msum.after.revpar!=null?fmtCOP(msum.after.revpar):'N/D')+'</td>'
      +'<td class="'+cls(msum.deltaRevPAR)+'">'+fmtD(msum.deltaRevPAR,'COP')+'</td></tr>';
  }
  html += '</tbody></table></div>';
  return html;
}

// ── OCR TEXT PARSER ───────────────────────────────────────────────────────────
function otbParseOCRText(text) {
  var lines = text.split('\n').map(function(l){ return l.trim(); }).filter(function(l){ return l.length > 3; });

  // Colombian & ISO date patterns
  var reDateFull = /(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})/;       // YYYY-MM-DD
  var reDateDMY  = /(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})/;        // DD/MM/YYYY
  var reDateDMY2 = /(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2})(?!\d)/;  // DD/MM/YY

  function extractDate(s) {
    var m;
    m = s.match(reDateFull);
    if (m) return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
    m = s.match(reDateDMY);
    if (m) return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
    m = s.match(reDateDMY2);
    if (m) return '20'+m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
    return null;
  }

  function looksLikeDate(s) {
    return reDateFull.test(s) || reDateDMY.test(s) || reDateDMY2.test(s);
  }

  // Extract all numbers from a string, handling COP format (1.234.567,89 or 1,234,567.89)
  function extractNumbers(s) {
    // Normalize: remove date part first
    var cleaned = s
      .replace(reDateFull, ' ')
      .replace(reDateDMY, ' ')
      .replace(reDateDMY2, ' ');

    var nums = [];
    // Match numbers with optional thousands/decimal separators
    var matches = cleaned.matchAll(/\b(\d{1,3}(?:[.,\s]\d{3})+(?:[.,]\d{1,2})?|\d+(?:[.,]\d+)?)\b/g);
    for (var m of matches) {
      var raw = m[1].replace(/\s/g,'');
      // Detect Colombian format: dots as thousands, comma as decimal
      var n;
      if (/^\d{1,3}(\.\d{3})+(,\d+)?$/.test(raw)) {
        n = parseFloat(raw.replace(/\./g,'').replace(',','.'));
      } else if (/^\d{1,3}(,\d{3})+(\.\d+)?$/.test(raw)) {
        n = parseFloat(raw.replace(/,/g,''));
      } else {
        n = parseFloat(raw.replace(',','.'));
      }
      if (!isNaN(n) && n >= 0) nums.push(n);
    }
    return nums;
  }

  var rows = [];

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (!looksLikeDate(line)) continue;

    var date = extractDate(line);
    if (!date) continue;

    var nums = extractNumbers(line).sort(function(a,b){ return a-b; });
    if (!nums.length) continue;

    // Classify numbers by typical ranges for Colombian hotel OTB (COP):
    // occ%:    0–100
    // rooms:   1–999 (integer)
    // ADR:     30,000–5,000,000
    // RevPAR:  10,000–4,000,000 (usually < ADR)
    // revenue: 1,000,000+

    var occ = null, rooms = null, adr = null, revpar = null, revenue = null;

    var candidates = {
      pct:      nums.filter(function(n){ return n > 0 && n <= 100; }),
      smallInt: nums.filter(function(n){ return n === Math.floor(n) && n >= 1 && n < 1000; }),
      medium:   nums.filter(function(n){ return n >= 30000 && n < 2000000; }),
      large:    nums.filter(function(n){ return n >= 2000000; })
    };

    if (candidates.pct.length)      occ    = candidates.pct[candidates.pct.length-1]; // highest % = occ
    if (candidates.smallInt.length) rooms  = candidates.smallInt[candidates.smallInt.length-1];
    if (candidates.medium.length >= 2) {
      // Sort medium: RevPAR < ADR (typically)
      var med = candidates.medium.slice().sort(function(a,b){return a-b;});
      revpar = med[0];
      adr    = med[med.length-1];
    } else if (candidates.medium.length === 1) {
      adr = candidates.medium[0];
    }
    if (candidates.large.length)    revenue = candidates.large[candidates.large.length-1];

    rows.push({ date: date, dayOfMonth: parseInt(date.slice(8,10)), occ: occ, rooms: rooms, adr: adr, revpar: revpar, revenue: revenue, confidence: 'ocr' });
  }

  // Fallback: if no date-keyed rows found, try to extract percentage sequence from bar chart images
  if (!rows.length) {
    var summary = otbExtractSummaryFromOCR(text);
    var startDate = summary && summary.startDate ? summary.startDate : null;

    // Collect all percentage tokens from entire text
    var pctTokens = [];
    var rePct = /\b(\d{1,3})[,.](\d{1,2})\s*%|\b(\d{1,3})\s*%/g;
    var allText = text.replace(/\n/g,' ');
    var pm;
    while ((pm = rePct.exec(allText)) !== null) {
      var val;
      if (pm[1] !== undefined && pm[2] !== undefined) {
        val = parseFloat(pm[1] + '.' + pm[2]);
      } else {
        val = parseFloat(pm[3]);
      }
      if (val >= 0 && val <= 100) pctTokens.push(val);
    }

    // Deduplicate consecutive identical values only if excessive
    if (pctTokens.length > 35) {
      var deduped = [];
      pctTokens.forEach(function(v, i) {
        if (i === 0 || v !== pctTokens[i-1]) deduped.push(v);
      });
      pctTokens = deduped;
    }

    if (pctTokens.length >= 2 && startDate) {
      var baseMs = new Date(startDate).getTime();
      pctTokens.forEach(function(val, idx) {
        var d = new Date(baseMs + idx * 86400000);
        var dateStr = d.toISOString().slice(0,10);
        var dom = d.getDate();
        rows.push({ date: dateStr, dayOfMonth: dom, occ: val, rooms: null, adr: null, revpar: null, revenue: null, confidence: 'ocr' });
      });
    } else if (pctTokens.length >= 2) {
      // No start date: use day-of-month index starting at 1
      pctTokens.forEach(function(val, idx) {
        var dom = idx + 1;
        rows.push({ date: null, dayOfMonth: dom, occ: val, rooms: null, adr: null, revpar: null, revenue: null, confidence: 'ocr' });
      });
    }
  }

  return rows;
}

function otbShowMappingUI() {
  const area = document.getElementById('otb-mapping-area');
  const sides = [
    { key:'before', label:'OTB ANTES' },
    { key:'after',  label:'OTB DESPUÉS' }
  ].filter(function(s){ return OTB_STATE[s.key+'Headers']; });

  if (!sides.length) { if(area) area.innerHTML=''; return; }

  let html = '<div class="otb-card"><div class="otb-card-title">Mapeo de columnas</div>';
  sides.forEach(function(s) {
    const headers = OTB_STATE[s.key+'Headers'];
    const mapping = OTB_STATE[s.key+'Mapping'];
    const fields = [
      { key:'date',    label:'Fecha *' },
      { key:'occ',     label:'Ocupación %' },
      { key:'rooms',   label:'Hab. vendidas' },
      { key:'adr',     label:'ADR' },
      { key:'revpar',  label:'RevPAR' },
      { key:'revenue', label:'Ingresos' },
      { key:'hotel',   label:'Hotel' }
    ];
    html += '<div style="margin-bottom:12px"><strong style="font-size:.78rem;color:var(--gold-dark)">'+s.label+'</strong><div class="otb-map-grid">';
    fields.forEach(function(f) {
      const opts = [''].concat(headers).map(function(h){ return '<option value="'+h+'"'+(mapping[f.key]===h?' selected':'')+'>'+( h||'— No mapear —')+'</option>'; }).join('');
      html += '<div class="otb-map-row"><label>'+f.label+'</label><select data-side="'+s.key+'" data-field="'+f.key+'" onchange="otbUpdateMapping(this)">'+opts+'</select></div>';

}

function otbUpdateMapping(sel) {
  const side = sel.dataset.side;
  const field = sel.dataset.field;
  if (!OTB_STATE[side+'Mapping']) OTB_STATE[side+'Mapping'] = {};
  OTB_STATE[side+'Mapping'][field] = sel.value || null;
}

function otbApplyMapping() {
  if (!OTB_STATE.beforeMapping || !OTB_STATE.beforeMapping.date) { otbShowError('Mapee la columna Fecha para OTB ANTES'); return; }
  if (!OTB_STATE.afterMapping  || !OTB_STATE.afterMapping.date)  { otbShowError('Mapee la columna Fecha para OTB DESPUÉS'); return; }

  // OCR data is already parsed — no WB needed
  if (!OTB_STATE.beforeData) OTB_STATE.beforeData = parseFileData(OTB_STATE.beforeWB, OTB_STATE.beforeMapping);
  if (!OTB_STATE.afterData)  OTB_STATE.afterData  = parseFileData(OTB_STATE.afterWB,  OTB_STATE.afterMapping);

  if (!OTB_STATE.beforeData.length) { otbShowError('No se encontraron filas con fechas válidas en ANTES'); return; }
  if (!OTB_STATE.afterData.length)  { otbShowError('No se encontraron filas con fechas válidas en DESPUÉS'); return; }

  otbShowEditorUI();
  const cmpBtn = document.getElementById('otb-compare-btn-area');
  if (cmpBtn) cmpBtn.style.display = 'block';
}

function otbEditCell(input) {
  const side = input.dataset.side;
  const idx  = parseInt(input.dataset.idx);
  const field = input.dataset.field;
  const val = input.value;
  if (field === 'date') {
    OTB_STATE[side+'Data'][idx].date = val;
  } else {
    OTB_STATE[side+'Data'][idx][field] = parseFloat(val) || null;
  }
}

function otbRunComparison() {
  var modeEl = document.getElementById('otb-mode-select');
  var mode = (modeEl ? modeEl.value : null) || OTB_STATE.comparisonMode || 'dayOfMonth';
  OTB_STATE.comparisonMode = mode;

  var bData = OTB_STATE.beforeData || [];
  var aData = OTB_STATE.afterData  || [];

  // Guard: need daily rows for pickup analysis
  var errEl = document.getElementById('otb-errors');
  if (errEl) errEl.innerHTML = '';

  if (!bData.length || !aData.length) {
    var missing = [];
    if (!bData.length) missing.push('OTB Antes (Corte Base)');
    if (!aData.length) missing.push('OTB Después (Corte Actual)');
    otbShowError('Faltan datos diarios de: ' + missing.join(' y ') + '. Use el botón "✏ Ingresar datos manualmente" y pegue la secuencia de ocupación diaria (ej: 76, 76, 91, 74, 65…).');
    return;
  }

  // Check for sparse data — warn user if very few valid-occ rows
  var bValid = bData.filter(function(r){ return r.occ !== null && r.occ >= 0 && r.occ <= 100; });
  var aValid = aData.filter(function(r){ return r.occ !== null && r.occ >= 0 && r.occ <= 100; });
  if (bValid.length < 2 || aValid.length < 2) {
    var sparseParts = [];
    if (bValid.length < 2) sparseParts.push('OTB Base: '+bValid.length+' registros con ocupación válida (de '+bData.length+' total)');
    if (aValid.length < 2) sparseParts.push('OTB Actual: '+aValid.length+' registros con ocupación válida (de '+aData.length+' total)');
    otbShowError('⚠ Datos insuficientes para calcular pickup: '+sparseParts.join(' · ')
      +'.<br>Se requieren al menos 2 días con ocupación válida en cada período.<br>'
      +'<strong>Solución:</strong> Use "✏ Ingresar datos manualmente" e ingrese la secuencia de ocupación diaria. Ejemplo: <code>76, 76, 91, 74, 65, 76…</code>');
    return;
  }

  // Detect if comparing different months and suggest dayOfMonth
  var firstB = bData[0] && bData[0].date ? bData[0].date.slice(0,7) : '';
  var firstA = aData[0] && aData[0].date ? aData[0].date.slice(0,7) : '';
  var diffMonths = firstB && firstA && firstB !== firstA;
  if (diffMonths && mode === 'exactDate') {
    // Auto-correct: different months cannot match by exact date
    mode = 'dayOfMonth';
    OTB_STATE.comparisonMode = 'dayOfMonth';
    if (modeEl) modeEl.value = 'dayOfMonth';
    var notice = document.getElementById('otb-errors');
    if (notice) {
      notice.innerHTML = '<div class="otb-alert yellow">⚠ Los períodos corresponden a meses diferentes ('+firstB+' vs '+firstA+'). Se comparará por día del mes para medir pickup entre períodos equivalentes.</div>';
      setTimeout(function(){ if(notice) notice.innerHTML=''; }, 6000);
    }
  }

  var result;
  if (mode === 'exactDate') {
    var rows = compareOTB(bData, aData);
    result = { rows: rows, matched: rows.length, unmatched: Math.abs(bData.length - aData.length), mode: 'exactDate' };
  } else if (mode === 'periodIndex') {
    result = compareOTBByPeriodIndex(bData, aData);
  } else if (mode === 'monthlySummary') {
    // Monthly summary as a supplement rendered below the main pickup table
    result = compareOTBByDayOfMonth(bData, aData);
  } else {
    result = compareOTBByDayOfMonth(bData, aData);
  }

  // Diagnostics card
  var diagItems = [
    { ok: bData.length > 0, text: 'Corte base: ' + bData.length + ' días de ocupación' },
    { ok: aData.length > 0, text: 'Corte actual: ' + aData.length + ' días de ocupación' },
    { ok: result.matched > 0, text: 'Días comparables con pickup: ' + result.matched }
  ];
  if (result.unmatched > 0) diagItems.push({ ok: false, text: result.unmatched + ' días sin coincidencia' });
  otbRenderDiagnostics({ items: diagItems,
    suggestion: result.matched === 0 ? 'Verifique que las fechas de inicio sean correctas. Para meses distintos use el modo "Día del mes".' : null
  });

  if (!result.rows || !result.rows.length) {
    otbShowError('No se encontraron días comparables. Verifique los datos ingresados y el modo de comparación.');
    return;
  }

  OTB_STATE.comparison = result.rows;
  OTB_STATE.metrics    = buildSummaryMetrics(result.rows);
  OTB_STATE.recs       = generateRecommendations(OTB_STATE.metrics, result.rows);
  OTB_STATE.weeklyComparison = compareWeekly(bData, aData);
  OTB_STATE.weeklyMetrics = buildWeeklyMetrics(OTB_STATE.weeklyComparison);

  otbRenderComparison();
  otbRenderWeekly();
  // Charts are rendered lazily when the tab is activated (avoids 0px canvas issue on hidden tab)
  OTB_STATE._chartsDirty = true;
  otbRenderConsultant();
  // Clear stale warnings now that we've recalculated
  ['before','after'].forEach(function(s) {
    const w = document.getElementById('otb-stale-'+s);
    if (w) w.classList.remove('show');
  });
  otbSetStatus('active');
  otbSwitchToComparisonTab();
}

function otbSwitchToComparisonTab() {
  document.querySelectorAll('.otb-tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.otb-sub-panel').forEach(function(p){ p.classList.remove('active'); });
  var compBtn = document.querySelector('.otb-tab-btn[data-tab="comparison"]');
  if (compBtn) compBtn.classList.add('active');
  var compPanel = document.getElementById('otb-panel-comparison');
  if (compPanel) compPanel.classList.add('active');
}

function buildSummaryFromRows(rows) {
  if (!rows || !rows.length) return null;
  function getV(r,k){ return parseFloat(r[k]||r[k.toLowerCase()]||0)||0; }
  var totalOcc=0, totalADR=0, totalRevPAR=0, n=0;
  rows.forEach(function(r){
    var o=getV(r,'occ')||getV(r,'Ocup%');
    var a=getV(r,'adr')||getV(r,'ADR');
    var rp=getV(r,'revpar')||getV(r,'RevPAR');
    if(o||a||rp){ totalOcc+=o; totalADR+=a; totalRevPAR+=rp; n++; }
  });
  if(!n) return null;
  return { occ: totalOcc/n, adr: totalADR/n, revpar: totalRevPAR/n, label: 'Promedio' };
}

function otbRenderConsultantFromSummary(msum) {
  var el = document.getElementById('otb-consultant-area');
  if (!el) return;
  var general = msum.general;
  var recs = [];
  if (msum.deltaOcc !== null && msum.deltaOcc < -5) recs.push('Ocupación bajó '+Math.abs(msum.deltaOcc).toFixed(1)+'pp. Revisar estrategia de precios y promociones.');
  if (msum.deltaADR !== null && msum.deltaADR < 0) recs.push('ADR disminuyó. Evalúe si los descuentos están erosionando el ingreso promedio.');
  if (msum.deltaRevPAR !== null && msum.deltaRevPAR > 0) recs.push('RevPAR mejoró '+fmtCOP(msum.deltaRevPAR)+'. Continúe la estrategia actual.');
  if (!recs.length) recs.push('Rendimiento estable. Monitoree la evolución semanal.');
  el.innerHTML = '<div class="otb-card"><div class="otb-card-title">🤖 Análisis Revenue Manager</div>'
    + '<div class="otb-actions-list"><ul>'+recs.map(function(r){ return '<li>'+r+'</li>'; }).join('')+'</ul></div></div>';
}

function otbRenderComparison() {
  var m = OTB_STATE.metrics;
  var rows = OTB_STATE.comparison;

  var alertClass = 'gray', alertText = 'OTB estable frente al período base.';
  if (m.general === 'Positivo') { alertClass='green'; alertText='✅ El OTB muestra pickup positivo — la ocupación está creciendo frente al período base.'; }
  else if (m.general === 'Negativo') { alertClass='red'; alertText='🔴 El OTB muestra pickup negativo — la ocupación está por debajo del período base en la mayoría de fechas.'; }
  else if (m.general === 'Mixto') { alertClass='yellow'; alertText='⚠ Pickup mixto — algunas fechas crecen y otras caen. Gestión diferenciada requerida.'; }

  var alertsArea = document.getElementById('otb-alerts-area');
  if (alertsArea) alertsArea.innerHTML = '<div class="otb-alert '+alertClass+'">'+alertText+'</div>';

  // Pickup-centric KPI cards
  var avgPU = m.avgPickup !== null ? m.avgPickup.toFixed(1) : 'N/D';
  var avgCls = m.avgPickup > 0 ? 'up' : m.avgPickup < 0 ? 'down' : '';
  var bestLabel = m.bestDay ? 'Día '+m.bestDay.day+' (+'+m.bestDay.pickup.toFixed(1)+'pp)' : 'N/D';
  var worstLabel = m.worstDay ? 'Día '+m.worstDay.day+' ('+m.worstDay.pickup.toFixed(1)+'pp)' : 'N/D';
  var kpis = [
    { label:'Fechas comparadas', val: m.total, cls:'', sub:'' },
    { label:'Con pickup positivo', val: m.up, cls:'up', sub: m.total ? Math.round(m.up/m.total*100)+'%' : '' },
    { label:'Con pickup negativo', val: m.down, cls:'down', sub: m.total ? Math.round(m.down/m.total*100)+'%' : '' },
    { label:'Estables', val: m.stable, cls:'', sub:'' },
    { label:'Pickup prom. (pp)', val: (m.avgPickup!==null?(m.avgPickup>0?'+':'')+avgPU+' pp':'N/D'), cls:avgCls, sub:'puntos porcentuales' },
    { label:'Mejor fecha', val: bestLabel, cls:'up', sub:'' },
    { label:'Peor fecha', val: worstLabel, cls:'down', sub:'' },
  ];
  if (m.hasRooms) {
    kpis.push({ label:'Pickup total habs.', val: (m.totalRoomPickup>0?'+':'')+Math.round(m.totalRoomPickup), cls: m.totalRoomPickup>=0?'up':'down', sub:'habitaciones' });
  }
  var wm = OTB_STATE.weeklyMetrics;
  if (wm) {
    kpis.push({ label:'Semanas comparadas', val: wm.totalWeeks, cls:'', sub:'' });
    kpis.push({ label:'Semanas pickup positivo', val: wm.positiveWeeks, cls:'up', sub:'' });
    kpis.push({ label:'Semanas pickup negativo', val: wm.negativeWeeks, cls:'down', sub:'' });
    if (wm.bestWeek) kpis.push({ label:'Mejor semana', val: wm.bestWeek.weekLabel+' ('+(wm.bestWeek.avgPickup>0?'+':'')+wm.bestWeek.avgPickup.toFixed(1)+'pp)', cls:'up', sub:'' });
    if (wm.worstWeek) kpis.push({ label:'Peor semana', val: wm.worstWeek.weekLabel+' ('+wm.worstWeek.avgPickup.toFixed(1)+'pp)', cls:'down', sub:'' });
  }
  var kpiArea = document.getElementById('otb-kpi-area');
  if (kpiArea) kpiArea.innerHTML = '<div style="margin-bottom:8px;font-size:.72rem;font-weight:700;color:var(--gray3);text-transform:uppercase;letter-spacing:.05em">Ficha Técnica de Pickup OTB</div>'
    + '<div class="otb-kpi-grid">'
    + kpis.map(function(k){ return '<div class="otb-kpi '+k.cls+'"><div class="otb-kpi-label">'+k.label+'</div><div class="otb-kpi-value">'+k.val+'</div><div class="otb-kpi-sub">'+k.sub+'</div></div>'; }).join('')
    + '</div>';

  var filtersArea = document.getElementById('otb-filters-area');
  if (filtersArea) filtersArea.innerHTML = '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center">'
    + '<span style="font-size:.74rem;font-weight:700;color:var(--gray4)">Filtrar:</span>'
    + '<button class="otb-btn" data-filter="all" onclick="otbFilter(\'all\',this)" style="background:var(--gold);color:#fff">Todas</button>'
    + '<button class="otb-btn" data-filter="strong-up" onclick="otbFilter(\'strong-up\',this)">⬆ Pickup fuerte</button>'
    + '<button class="otb-btn" data-filter="moderate-up" onclick="otbFilter(\'moderate-up\',this)">↑ Pickup moderado</button>'
    + '<button class="otb-btn" data-filter="stable" onclick="otbFilter(\'stable\',this)">⚫ Estable</button>'
    + '<button class="otb-btn" data-filter="moderate-down" onclick="otbFilter(\'moderate-down\',this)">↓ Caída moderada</button>'
    + '<button class="otb-btn" data-filter="strong-down" onclick="otbFilter(\'strong-down\',this)">⬇ Caída fuerte</button>'
    + '</div>';

  otbRenderTable(rows);

  // Monthly context summary appended below the main pickup table
  var bSum = OTB_STATE.beforeSummary, aSum = OTB_STATE.afterSummary;
  if (!bSum && OTB_STATE.beforeData && OTB_STATE.beforeData.length) bSum = buildSummaryFromRows(OTB_STATE.beforeData);
  if (!aSum && OTB_STATE.afterData && OTB_STATE.afterData.length) aSum = buildSummaryFromRows(OTB_STATE.afterData);
  var tArea = document.getElementById('otb-table-area');
  if (tArea && bSum && aSum) {
    var msum = compareOTBMonthlySummary(bSum, aSum);
    if (msum) tArea.innerHTML += '<details style="margin-top:16px"><summary style="cursor:pointer;font-size:.72rem;font-weight:700;color:var(--gray3);text-transform:uppercase;letter-spacing:.05em;user-select:none">▶ Resumen mensual de contexto (ADR / RevPAR)</summary>'
      + otbRenderMonthlySummary(msum) + '</details>';
  }
  // Inventory notice
  if (!OTB_STATE.inventory && tArea) {
    tArea.innerHTML += '<div style="margin-top:10px;padding:8px 12px;background:#fffbee;border:1px solid #e8c88a;border-radius:6px;font-size:.73rem;color:#7a5a00">'
      + '💡 Ingrese el número de habitaciones del hotel en el campo "Habitaciones del hotel" para ver el pickup en habitaciones junto a cada fecha.</div>';
  }
}

function otbFilter(filter, btn) {
  document.querySelectorAll('[data-filter]').forEach(function(b){ b.style.background=''; b.style.color=''; });
  btn.style.background = 'var(--gold)'; btn.style.color = '#fff';
  var rows = filter === 'all' ? OTB_STATE.comparison : OTB_STATE.comparison.filter(function(r){ return r.status === filter; });
  otbRenderTable(rows);
}

function otbRenderTable(rows) {
  var hasRooms = rows.some(function(r){ return r.roomPickup !== null; });
  var html = '<div style="margin-bottom:6px;font-size:.72rem;font-weight:700;color:var(--gray3);text-transform:uppercase;letter-spacing:.05em">Pickup por Fecha</div>';
  html += '<div class="otb-table-wrap"><table class="otb-table"><thead><tr>'
    + '<th>Día</th><th>Fecha Base</th><th>Fecha Actual</th>'
    + '<th>Occ Base</th><th>Occ Actual</th>'
    + '<th>Pickup (pp)</th><th>Var. Relativa</th><th></th>';
  if (hasRooms) html += '<th>Habs Base</th><th>Habs Actual</th><th>Pickup Habs</th>';
  html += '<th>Estado Pickup</th><th>Diagnóstico Revenue</th></tr></thead><tbody>';

  rows.forEach(function(r) {
    var pickup = r.pickup;
    var pp = pickup !== null ? (pickup>0?'+':'')+pickup.toFixed(1)+' pp' : '—';
    var pctRel = r.pctChange !== null ? (r.pctChange>0?'+':'')+r.pctChange.toFixed(1)+'%' : '—';
    var statusCls = { 'strong-up':'color:#1a6e3c;font-weight:800', 'moderate-up':'color:#2a9e5c;font-weight:700',
                      'stable':'color:#888', 'moderate-down':'color:#c07800;font-weight:700',
                      'strong-down':'color:#c00;font-weight:800', 'unknown':'color:#aaa' }[r.status] || '';
    var action = pickupAction(r.status);
    var row = '<tr>'
      + '<td style="font-weight:700;text-align:center">'+r.day+'</td>'
      + '<td style="white-space:nowrap;font-size:.75rem">'+r.beforeDate+'</td>'
      + '<td style="white-space:nowrap;font-size:.75rem">'+r.afterDate+'</td>'
      + '<td style="text-align:center">'+(r.occBefore!==null?r.occBefore.toFixed(1)+'%':'—')+'</td>'
      + '<td style="text-align:center">'+(r.occAfter!==null?r.occAfter.toFixed(1)+'%':'—')+'</td>'
      + '<td style="text-align:center;'+statusCls+'">'+pp+'</td>'
      + '<td style="text-align:center;'+statusCls+'">'+pctRel+'</td>'
      + '<td style="text-align:center">'+pickupIcon(pickup)+'</td>';
    if (hasRooms) {
      row += '<td style="text-align:center">'+(r.roomsBefore!==null?Math.round(r.roomsBefore):'—')+'</td>'
           + '<td style="text-align:center">'+(r.roomsAfter!==null?Math.round(r.roomsAfter):'—')+'</td>'
           + '<td style="text-align:center;'+statusCls+'">'+(r.roomPickup!==null?(r.roomPickup>0?'+':'')+Math.round(r.roomPickup)+' habs':'—')+'</td>';
    }
    row += '<td style="white-space:nowrap;font-size:.8rem">'+pickupLabel(r.status)+'</td>'
         + '<td style="font-size:.68rem;color:#555;max-width:160px">'+action+'</td>'
         + '</tr>';
    html += row;
  });
  html += '</tbody></table></div>';
  var tArea = document.getElementById('otb-table-area');
  if (tArea) tArea.innerHTML = html;
}

function otbRenderCharts() {
  var area = document.getElementById('otb-charts-area');
  if (!area) return;

  // Destroy previous chart instances
  Object.values(OTB_STATE.charts).forEach(function(c){ try { c.destroy(); } catch(e){} });
  OTB_STATE.charts = {};
  area.innerHTML = '';

  var allRows   = OTB_STATE.comparison || [];
  var rows      = allRows.filter(function(r){ return r.pickup !== null; });
  var bData     = OTB_STATE.beforeData  || [];
  var aData     = OTB_STATE.afterData   || [];

  // ── DEBUG STRIP (always visible, helps diagnose data issues) ──────────────
  var debugBar = document.createElement('div');
  debugBar.style.cssText = 'background:#f8f4e8;border:1px solid #e8d88a;border-radius:8px;padding:10px 16px;'
    + 'font-size:.73rem;color:#7a6500;margin-bottom:16px;display:flex;gap:20px;flex-wrap:wrap;align-items:center';
  var srcB = OTB_STATE.beforeSource || '—';
  var srcA = OTB_STATE.afterSource  || '—';
  var bValid2 = bData.filter(function(r){ return r.occ !== null && r.occ >= 0 && r.occ <= 100; }).length;
  var aValid2 = aData.filter(function(r){ return r.occ !== null && r.occ >= 0 && r.occ <= 100; }).length;
  debugBar.innerHTML = '<strong style="color:#5a4a00">📊 Estado de datos del análisis</strong>'
    + '<span>OTB Base (<em>'+srcB+'</em>): <strong>'+bData.length+'</strong> filas · <strong>'+bValid2+'</strong> con occ válida</span>'
    + '<span>OTB Actual (<em>'+srcA+'</em>): <strong>'+aData.length+'</strong> filas · <strong>'+aValid2+'</strong> con occ válida</span>'
    + '<span>Días comparables: <strong>'+allRows.length+'</strong></span>'
    + '<span>Con pickup calculado: <strong>'+rows.length+'</strong></span>'
    + '<span>Modo: <strong>'+(OTB_STATE.comparisonMode||'dayOfMonth')+'</strong></span>';
  if (OTB_STATE.weeklyComparison) {
    debugBar.innerHTML += '<span>Semanas: <strong>'+OTB_STATE.weeklyComparison.length+'</strong></span>';
  }
  area.appendChild(debugBar);

  // ── INSUFFICIENT DATA DIAGNOSTIC ─────────────────────────────────────────
  if (rows.length < 2) {
    var diagDiv = document.createElement('div');
    diagDiv.style.cssText = 'grid-column:1/-1;background:#fff8f0;border:2px solid #f5a623;border-radius:10px;padding:24px 28px;';
    var reason = '';
    if (!bData.length && !aData.length) {
      reason = 'No hay datos en ningún período. Ingrese los datos de OTB Base y OTB Actual.';
    } else if (!bData.length) {
      reason = 'Faltan los datos del OTB Base (período anterior).';
    } else if (!aData.length) {
      reason = 'Faltan los datos del OTB Actual (período nuevo).';
    } else if (allRows.length < 2) {
      reason = 'No se encontraron días comparables. Verifique que las fechas de inicio sean correctas y que los modos de comparación coincidan.';
    } else if (rows.length < 2) {
      reason = 'Se detectaron '+allRows.length+' días comparables, pero la mayoría no tienen ocupación válida en ambos períodos. '
        + 'Esto ocurre cuando el OCR no pudo leer los valores de ocupación. Use "✏ Ingresar datos manualmente" y pegue la secuencia diaria (ej: 76, 76, 91, 74, 65…).';
    }
    diagDiv.innerHTML = '<div style="font-size:.9rem;font-weight:800;color:#c07000;margin-bottom:10px">⚠ Datos insuficientes para graficar el pickup diario</div>'
      + '<p style="font-size:.8rem;color:#555;margin:0 0 14px">Se detectaron <strong>'+rows.length+'</strong> registro(s) con pickup calculado. '
      + 'Para graficar se requieren al menos <strong>2 registros comparables</strong>.</p>'
      + '<p style="font-size:.8rem;color:#555;margin:0 0 14px"><strong>Motivo probable:</strong> '+reason+'</p>'
      + '<table style="font-size:.77rem;border-collapse:collapse;width:100%;max-width:500px">'
      + '<tr><td style="padding:4px 8px;border:1px solid #e8d88a;color:#7a6500">Registros OTB Base</td><td style="padding:4px 8px;border:1px solid #e8d88a;font-weight:700">'+bData.length+'</td></tr>'
      + '<tr><td style="padding:4px 8px;border:1px solid #e8d88a;color:#7a6500">Registros OTB Actual</td><td style="padding:4px 8px;border:1px solid #e8d88a;font-weight:700">'+aData.length+'</td></tr>'
      + '<tr><td style="padding:4px 8px;border:1px solid #e8d88a;color:#7a6500">Días comparables generados</td><td style="padding:4px 8px;border:1px solid #e8d88a;font-weight:700">'+allRows.length+'</td></tr>'
      + '<tr><td style="padding:4px 8px;border:1px solid #e8d88a;color:#7a6500">Con pickup calculado</td><td style="padding:4px 8px;border:1px solid #e8d88a;font-weight:700">'+rows.length+'</td></tr>'
      + '</table>'
      + '<div style="margin-top:16px;padding:12px 16px;background:#fff3cd;border-radius:6px;font-size:.78rem;color:#856404">'
      + '<strong>Acción sugerida:</strong> Haga clic en "✏ Ingresar datos manualmente" en cada card de carga. '
      + 'Ingrese la fecha de inicio del período y pegue la secuencia de ocupación diaria (un número por día, separado por comas). '
      + 'Ejemplo: <code style="background:#fff;padding:1px 6px;border-radius:3px">76, 76, 91, 74, 65, 76, 87, 91, 87, 76…</code>'
      + '</div>';
    area.appendChild(diagDiv);
    return;
  }

  var inv = OTB_STATE.inventory;
  var labels = rows.map(function(r){ return 'D'+r.day; });

  // Color helpers
  function barColor(pickup, alpha) {
    alpha = alpha || 1;
    if (pickup > 10)   return 'rgba(22,120,60,'+alpha+')';
    if (pickup > 2)    return 'rgba(60,170,90,'+alpha+')';
    if (pickup >= -2)  return 'rgba(150,150,150,'+alpha+')';
    if (pickup >= -10) return 'rgba(210,90,20,'+alpha+')';
    return 'rgba(195,0,0,'+alpha+')';
  }

  // Box builders
  function mkFull(id, title, subtitle) {
    var box = document.createElement('div');
    box.className = 'otb-chart-box';
    box.style.cssText = 'grid-column:1/-1';
    box.innerHTML = '<div class="otb-chart-title">'+title+'</div>'
      +(subtitle?'<div style="font-size:.68rem;color:#888;margin-bottom:8px">'+subtitle+'</div>':'')
      +'<div style="position:relative;height:'+( arguments[3]||260)+'px"><canvas id="'+id+'"></canvas></div>';
    area.appendChild(box); return id;
  }
  function mkHalf(id, title, h) {
    var box = document.createElement('div'); box.className = 'otb-chart-box';
    box.innerHTML = '<div class="otb-chart-title">'+title+'</div>'
      +'<div style="position:relative;height:'+(h||220)+'px"><canvas id="'+id+'"></canvas></div>';
    area.appendChild(box); return id;
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // GRÁFICO 1 — PICKUP VISUAL POR FECHA
  // Barras = ocupación actual (como el OTB original) coloreadas por pickup
  // Línea  = ocupación base superpuesta (referencia del período anterior)
  // ─────────────────────────────────────────────────────────────────────────────
  var g1id = mkFull('ch-otb-main',
    'Pickup visual por fecha — OTB Actual vs OTB Base',
    'Barras = ocupación actual coloreadas por pickup · Línea = ocupación base (referencia) · Verde = ganó pickup · Rojo = perdió pickup · Gris = estable',
    360
  );
  var g1labels = rows.map(function(r){ return 'D'+r.day; });
  OTB_STATE.charts['ch-otb-main'] = new Chart(document.getElementById(g1id), {
    type: 'bar',
    data: {
      labels: g1labels,
      datasets: [
        {
          // Bars: actual occupancy, colored by pickup status
          type: 'bar',
          label: 'Occ Actual',
          data: rows.map(function(r){ return r.occAfter !== null ? parseFloat(r.occAfter.toFixed(1)) : null; }),
          backgroundColor: rows.map(function(r){ return barColor(r.pickup, 0.78); }),
          borderColor:     rows.map(function(r){ return barColor(r.pickup, 1); }),
          borderWidth: 1,
          borderRadius: 3,
          yAxisID: 'y',
          order: 2,
          datalabels: {
            display: true,
            anchor: 'end', align: 'top',
            formatter: function(v, ctx) {
              var pu = rows[ctx.dataIndex].pickup;
              return (pu > 0 ? '+' : '') + parseFloat(pu.toFixed(0));
            },
            font: { size: 9, weight: 'bold' },
            color: function(ctx) {
              var pu = rows[ctx.dataIndex].pickup;
              return pu > 2 ? '#0e5a30' : pu < -2 ? '#a00' : '#555';
            }
          }
        },
        {
          // Line: base occupancy (reference)
          type: 'line',
          label: 'Occ Base (referencia)',
          data: rows.map(function(r){ return r.occBefore !== null ? parseFloat(r.occBefore.toFixed(1)) : null; }),
          borderColor: 'rgba(30,80,180,0.75)',
          backgroundColor: 'transparent',
          borderWidth: 2,
          borderDash: [4, 3],
          pointRadius: 2,
          pointBackgroundColor: 'rgba(30,80,180,0.9)',
          tension: 0.3,
          yAxisID: 'y',
          order: 1,
          datalabels: { display: false }
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 14 } },
        tooltip: {
          backgroundColor: 'rgba(20,20,20,.9)',
          titleFont: { size: 12 },
          bodyFont: { size: 11 },
          padding: 10,
          callbacks: {
            title: function(items) {
              var r = rows[items[0].dataIndex];
              return 'Día '+r.day+' | '+r.afterDate;
            },
            label: function(item) {
              var r = rows[item.dataIndex];
              if (item.dataset.label === 'Occ Base (referencia)')
                return '  OTB Base: '+(r.occBefore!==null?r.occBefore.toFixed(1)+'%':'N/D');
              var lines = [
                '  OTB Actual: '+(r.occAfter!==null?r.occAfter.toFixed(1)+'%':'N/D'),
                '  Pickup: '+(r.pickup>0?'+':'')+r.pickup.toFixed(1)+' pp  · '+pickupLabel(r.status)
              ];
              if (inv && r.roomPickup !== null) {
                lines.push('  Habs: '+Math.round(r.roomsBefore||0)+' → '+Math.round(r.roomsAfter||0)+' ('+(r.roomPickup>0?'+':'')+Math.round(r.roomPickup)+' habs)');
              }
              return lines;
            }
          }
        }
      },
      scales: {
        x: { grid: { color:'rgba(0,0,0,.05)' },
          ticks: { font:{size: rows.length > 20 ? 8 : 10}, maxRotation: rows.length > 20 ? 45 : 0 },
          title: { display:true, text:'Día del período', font:{size:10} } },
        y: { min:0, max:100, grid:{ color:'rgba(0,0,0,.06)' },
          ticks: { callback:function(v){return v+'%'}, font:{size:10} },
          title: { display:true, text:'Ocupación (%)', font:{size:10} } }
      }
    }
  });

  // ─────────────────────────────────────────────────────────────────────────────
  // GRÁFICO 2 — PICKUP DIARIO (pp) — barras centradas en cero
  // ─────────────────────────────────────────────────────────────────────────────
  var g2id = mkFull('ch-pickup-pp',
    'Pickup diario por fecha (puntos porcentuales)',
    '▲ Verde = ganó pickup  ▼ Rojo = perdió pickup  ● Gris = estable',
    280
  );
  OTB_STATE.charts['ch-pickup-pp'] = new Chart(document.getElementById(g2id), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Pickup (pp)',
        data: rows.map(function(r){ return parseFloat(r.pickup.toFixed(1)); }),
        backgroundColor: rows.map(function(r){ return barColor(r.pickup, 0.8); }),
        borderColor:     rows.map(function(r){ return barColor(r.pickup, 1); }),
        borderWidth: 1, borderRadius: 3, borderSkipped: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { display:false },
        datalabels: {
          display: true,
          anchor: function(ctx){ return ctx.dataset.data[ctx.dataIndex]>=0?'end':'start'; },
          align:  function(ctx){ return ctx.dataset.data[ctx.dataIndex]>=0?'top':'bottom'; },
          formatter: function(v){ return (v>0?'+':'')+v; },
          font: { size:9, weight:'bold' },
          color: function(ctx){ var v=ctx.dataset.data[ctx.dataIndex]; return v>2?'#0e5a30':v<-2?'#a00':'#555'; }
        },
        tooltip: {
          callbacks: {
            title: function(items){ var r=rows[items[0].dataIndex]; return 'Día '+r.day+' | '+r.afterDate; },
            label: function(item){
              var r=rows[item.dataIndex];
              return ['  Base: '+(r.occBefore!==null?r.occBefore.toFixed(1)+'%':'N/D'),
                      '  Actual: '+(r.occAfter!==null?r.occAfter.toFixed(1)+'%':'N/D'),
                      '  Pickup: '+(r.pickup>0?'+':'')+r.pickup.toFixed(1)+' pp',
                      '  Estado: '+pickupLabel(r.status)];
            }
          }
        }
      },
      scales: {
        x: { grid:{color:'rgba(0,0,0,.04)'}, ticks:{font:{size:10}},
          title:{display:true,text:'Día del período',font:{size:10}} },
        y: { grid:{color:'rgba(0,0,0,.06)'},
          ticks:{ callback:function(v){return (v>0?'+':'')+v+'pp'}, font:{size:10} },
          title:{display:true,text:'Pickup (pp)',font:{size:10}} }
      }
    }
  });

  // ─────────────────────────────────────────────────────────────────────────────
  // GRÁFICO 3 — OCUPACIÓN DIARIA: BASE vs ACTUAL (dos líneas)
  // ─────────────────────────────────────────────────────────────────────────────
  var g3id = mkFull('ch-occ-compare',
    'Ocupación diaria: OTB Base vs OTB Actual (%)',
    'Línea azul discontinua = OTB base  ·  Línea verde sólida = OTB actual  ·  La brecha entre líneas refleja el pickup',
    280
  );
  OTB_STATE.charts['ch-occ-compare'] = new Chart(document.getElementById(g3id), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label:'OTB Base (%)',   data:rows.map(function(r){return r.occBefore;}),
          borderColor:'rgba(30,80,180,.8)', backgroundColor:'rgba(30,80,180,.07)',
          borderDash:[5,3], borderWidth:2, tension:.35, fill:true,
          pointRadius:3, pointBackgroundColor:'rgba(30,80,180,.9)', datalabels:{display:false} },
        { label:'OTB Actual (%)', data:rows.map(function(r){return r.occAfter;}),
          borderColor:'rgba(22,120,60,.9)', backgroundColor:'rgba(22,120,60,.08)',
          borderWidth:2.5, tension:.35, fill:true,
          pointRadius:3, pointBackgroundColor:'rgba(22,120,60,1)', datalabels:{display:false} }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins: {
        legend:{ position:'top', labels:{font:{size:11},boxWidth:14} },
        datalabels:{ display:false },
        tooltip:{ callbacks:{
          title:function(items){ var r=rows[items[0].dataIndex]; return 'Día '+r.day+' | '+r.afterDate; },
          label:function(item){
            var r=rows[item.dataIndex];
            if(item.dataset.label==='OTB Base (%)') return '  Base: '+(r.occBefore!==null?r.occBefore.toFixed(1)+'%':'N/D');
            return ['  Actual: '+(r.occAfter!==null?r.occAfter.toFixed(1)+'%':'N/D'),
                    '  Pickup: '+(r.pickup>0?'+':'')+r.pickup.toFixed(1)+' pp · '+pickupLabel(r.status)];
          }
        }}
      },
      scales:{
        x:{grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{size:10}}},
        y:{min:0,max:100,grid:{color:'rgba(0,0,0,.06)'},ticks:{callback:function(v){return v+'%'},font:{size:10}},
          title:{display:true,text:'Ocupación (%)',font:{size:10}}}
      }
    }
  });

  // ─────────────────────────────────────────────────────────────────────────────
  // GRÁFICO 4 — PICKUP SEMANAL
  // ─────────────────────────────────────────────────────────────────────────────
  var wc = OTB_STATE.weeklyComparison;
  if (wc && wc.length) {
    var g4id = mkHalf('ch-weekly','Pickup semanal', 240);
    OTB_STATE.charts['ch-weekly'] = new Chart(document.getElementById(g4id), {
      type: 'bar',
      data: {
        labels: wc.map(function(w){ return w.weekLabel; }),
        datasets: [{
          label:'Pickup prom. (pp)',
          data: wc.map(function(w){ return w.avgPickup!==null?parseFloat(w.avgPickup.toFixed(1)):0; }),
          backgroundColor: wc.map(function(w){ return barColor(w.avgPickup||0, 0.8); }),
          borderColor:     wc.map(function(w){ return barColor(w.avgPickup||0, 1); }),
          borderWidth:1, borderRadius:4
        }]
      },
      options: {
        responsive:true,
        plugins:{ legend:{display:false},
          datalabels:{ display:true, formatter:function(v){return (v>0?'+':'')+v+' pp';}, font:{size:11,weight:'bold'},
            anchor:'end', align:'top',
            color:function(ctx){ var v=ctx.dataset.data[ctx.dataIndex]; return v>0?'#0e5a30':'#a00'; } },
          tooltip:{ callbacks:{ label:function(item){
            var w=wc[item.dataIndex];
            return ['  Pickup: '+(w.avgPickup>0?'+':'')+w.avgPickup.toFixed(1)+' pp',
                    '  Días: '+w.daysCompared, '  Estado: '+pickupLabel(w.status)];
          }}}
        },
        scales:{ y:{ ticks:{callback:function(v){return (v>0?'+':'')+v+'pp'},font:{size:10}}, grid:{color:'rgba(0,0,0,.05)'} } }
      }
    });
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // GRÁFICO 5 — DISTRIBUCIÓN DEL PICKUP
  // ─────────────────────────────────────────────────────────────────────────────
  var m = OTB_STATE.metrics;
  var g5id = mkHalf('ch-dist','Distribución del pickup', 240);
  OTB_STATE.charts['ch-dist'] = new Chart(document.getElementById(g5id), {
    type:'doughnut',
    data:{
      labels:['Pickup fuerte','Pickup moderado','Estable','Caída moderada','Caída fuerte'],
      datasets:[{ data:[m.strongUp,m.modUp,m.stable,m.modDown,m.strongDown],
        backgroundColor:['#1a6e3c','#5ab88a','#aaa','#e08000','#c00'], borderWidth:2, borderColor:'#fff' }]
    },
    options:{ responsive:true, cutout:'50%',
      plugins:{ legend:{position:'bottom',labels:{font:{size:10},boxWidth:12}}, datalabels:{display:false} } }
  });

  // ─────────────────────────────────────────────────────────────────────────────
  // GRÁFICO 6 — FECHAS CON MAYOR CRECIMIENTO Y MAYOR CAÍDA (horizontal)
  // ─────────────────────────────────────────────────────────────────────────────
  var valid = rows.filter(function(r){return r.pickup!==null;});
  var top5up   = valid.slice().sort(function(a,b){return b.pickup-a.pickup;}).slice(0,5);
  var top5down = valid.slice().sort(function(a,b){return a.pickup-b.pickup;}).slice(0,5);
  var g6id = mkFull('ch-ranking','Fechas con mayor crecimiento vs mayor caída de pickup',
    'Verde = días que más crecieron · Rojo = días que más cayeron', 280);
  OTB_STATE.charts['ch-ranking'] = new Chart(document.getElementById(g6id), {
    type:'bar',
    data:{
      labels: top5up.map(function(r){return 'Día '+r.day;}).concat(top5down.map(function(r){return 'Día '+r.day;})),
      datasets:[{ label:'Pickup (pp)',
        data: top5up.map(function(r){return parseFloat(r.pickup.toFixed(1));}).concat(top5down.map(function(r){return parseFloat(r.pickup.toFixed(1));})),
        backgroundColor: top5up.map(function(r){return barColor(r.pickup,0.8);}).concat(top5down.map(function(r){return barColor(r.pickup,0.8);})),
        borderColor:     top5up.map(function(r){return barColor(r.pickup,1);}).concat(top5down.map(function(r){return barColor(r.pickup,1);})),
        borderWidth:1, borderRadius:4
      }]
    },
    options:{
      indexAxis:'y', responsive:true,
      plugins:{ legend:{display:false},
        datalabels:{ display:true, formatter:function(v){return (v>0?'+':'')+v+' pp';}, font:{size:10,weight:'bold'},

          return ['  Base: '+(r.occBefore!==null?r.occBefore.toFixed(1)+'%':'N/D'),

      scales:{ x:{ ticks:{callback:function(v){return (v>0?'+':'')+v+'pp'},font:{size:10}}, grid:{color:'rgba(0,0,0,.05)'} } }
    }

  // ─────────────────────────────────────────────────────────────────────────────

  if (m.hasRooms) {

      type:'bar',
      data:{ labels:labels, datasets:[{ label:'Pickup habs',
        data:rows.map(function(r){return r.roomPickup!==null?Math.round(r.roomPickup):0;}),
        backgroundColor:rows.map(function(r){return barColor(r.pickup,0.78);}),
        borderColor:rows.map(function(r){return barColor(r.pickup,1);}),
        borderWidth:1, borderRadius:3
      }]},
      options:{ responsive:true,
        plugins:{ legend:{display:false},
          datalabels:{ display:true, formatter:function(v){return (v>0?'+':'')+v;}, font:{size:9,weight:'bold'},
            anchor:'end', align:function(ctx){return ctx.dataset.data[ctx.dataIndex]>=0?'top':'bottom';},
            color:function(ctx){var v=ctx.dataset.data[ctx.dataIndex]; return v>=0?'#0e5a30':'#a00';} }
        },
        scales:{ y:{ ticks:{callback:function(v){return (v>0?'+':'')+v+' habs'},font:{size:10}}, grid:{color:'rgba(0,0,0,.06)'} } }
      }
    });
  }
}

function otbRenderConsultant() {

  var avgPU = m.avgPickup !== null ? m.avgPickup.toFixed(1) : 'N/D';
  var diagBody = 'El análisis de pickup por día del mes muestra ';
  if (m.general === 'Positivo') {
    diagBody += 'crecimiento general de ocupación frente al período base. El pickup promedio es de +'+avgPU+' pp. Los días con pickup fuerte son oportunidad para ajuste tarifario al alza y protección de inventario.';
  } else if (m.general === 'Negativo') {
    diagBody += 'una caída de ocupación frente al período base. El pickup promedio es de '+avgPU+' pp. Se recomienda revisar competitividad tarifaria, activar acciones tácticas en fechas con pickup negativo y evaluar restricciones activas que puedan estar limitando la conversión.';
  } else if (m.general === 'Mixto') {
    diagBody += 'un comportamiento mixto. Algunas fechas ganan pickup y otras lo pierden. Se recomienda gestión diferenciada: proteger tarifa donde el pickup es positivo y activar estímulos comerciales donde es negativo.';
  } else {
    diagBody += 'estabilidad frente al período base. El pickup promedio es de '+avgPU+' pp. Se recomienda monitorear el pickup semanal antes de tomar decisiones tarifarias agresivas.';
  }

  var html = '<div class="otb-card"><div class="otb-card-title">🤖 Análisis de Pickup — Consultor Revenue Manager</div>'
    + '<div class="otb-alert '+(m.general==='Positivo'?'green':m.general==='Negativo'?'red':m.general==='Mixto'?'yellow':'gray')+'">'+diagBody+'</div></div>';

  html += '<div class="otb-card"><div class="otb-card-title">Recomendaciones por estado de pickup ('+recs.length+')</div>';

      + '<div class="otb-rec-body">'+r.body+'</div>'

  html += '</div>';

  // Top 5 best/worst by pickup

  var top5up   = validRows.slice().sort(function(a,b){ return b.pickup-a.pickup; }).slice(0,5);
  var top5down = validRows.slice().sort(function(a,b){ return a.pickup-b.pickup; }).slice(0,5);

  html += '<div class="otb-card"><div class="otb-card-title">Top 5 fechas con mayor pickup positivo</div><table class="otb-hist-table"><thead><tr><th>Día</th><th>Fecha Base</th><th>Fecha Actual</th><th>Occ Base</th><th>Occ Actual</th><th>Pickup</th></tr></thead><tbody>';
  top5up.forEach(function(r){ html += '<tr><td>'+r.day+'</td><td style="font-size:.76rem">'+r.beforeDate+'</td><td style="font-size:.76rem">'+r.afterDate+'</td><td>'+(r.occBefore!==null?r.occBefore.toFixed(1)+'%':'—')+'</td><td>'+(r.occAfter!==null?r.occAfter.toFixed(1)+'%':'—')+'</td><td class="ind-up">+'+(r.pickup).toFixed(1)+' pp</td></tr>'; });
  html += '</tbody></table></div>';

  html += '<div class="otb-card"><div class="otb-card-title">Top 5 fechas con mayor caída de pickup</div><table class="otb-hist-table"><thead><tr><th>Día</th><th>Fecha Base</th><th>Fecha Actual</th><th>Occ Base</th><th>Occ Actual</th><th>Pickup</th></tr></thead><tbody>';
  top5down.forEach(function(r){ html += '<tr><td>'+r.day+'</td><td style="font-size:.76rem">'+r.beforeDate+'</td><td style="font-size:.76rem">'+r.afterDate+'</td><td>'+(r.occBefore!==null?r.occBefore.toFixed(1)+'%':'—')+'</td><td>'+(r.occAfter!==null?r.occAfter.toFixed(1)+'%':'—')+'</td><td class="ind-down">'+(r.pickup).toFixed(1)+' pp</td></tr>'; });
  html += '</tbody></table></div>';

  // Context: ADR & RevPAR if available
  var hasCtx = validRows.some(function(r){ return r.adrBefore || r.revparBefore; });
  if (hasCtx) {
    html += '<div class="otb-card" style="border-color:#ccc"><div class="otb-card-title" style="color:#888">Métricas de contexto (ADR · RevPAR)</div>'
      + '<p style="font-size:.75rem;color:#888;margin:0 0 8px">ADR y RevPAR se muestran únicamente como referencia. El análisis principal es de pickup de ocupación.</p>'

    validRows.slice(0,10).forEach(function(r){
      html += '<tr><td>'+r.day+'</td><td>'+(r.adrBefore!==null?fmtCOP(r.adrBefore):'—')+'</td><td>'+(r.adrAfter!==null?fmtCOP(r.adrAfter):'—')+'</td><td>'+(r.revparBefore!==null?fmtCOP(r.revparBefore):'—')+'</td><td>'+(r.revparAfter!==null?fmtCOP(r.revparAfter):'—')+'</td></tr>';
    });
    html += '</tbody></table></div>';
  }

  // Weekly diagnosis
  var wc = OTB_STATE.weeklyComparison;
  var wm = OTB_STATE.weeklyMetrics;
  if (wc && wc.length && wm) {
    html += '<div class="otb-card"><div class="otb-card-title">📅 Diagnóstico Semanal</div>';
    html += '<table class="otb-hist-table"><thead><tr><th>Semana</th><th>Pickup Prom.</th><th>Estado</th><th>Acción recomendada</th></tr></thead><tbody>';
    wc.forEach(function(w) {
      html += '<tr><td>'+w.weekLabel+'</td>'
        + '<td>'+(w.avgPickup!==null?(w.avgPickup>0?'+':'')+w.avgPickup.toFixed(1)+' pp':'—')+'</td>'
        + '<td>'+pickupLabel(w.status)+'</td>'
        + '<td style="font-size:.72rem;color:#555">'+pickupAction(w.status)+'</td></tr>';
    });
    html += '</tbody></table>';
    var wkTrend = wm.general || 'Mixto';
    var wkSummary = 'Tendencia semanal: <strong>'+wkTrend+'</strong>. '
      + wm.positiveWeeks+' de '+wm.totalWeeks+' semanas muestran pickup positivo. '
      + (wm.avgWeeklyPickup !== null ? 'Pickup semanal promedio: '+(wm.avgWeeklyPickup>0?'+':'')+wm.avgWeeklyPickup.toFixed(1)+' pp. ' : '')
      + (wm.bestWeek ? 'Mejor semana: '+wm.bestWeek.weekLabel+'. ' : '')
      + (wm.worstWeek ? 'Semana más débil: '+wm.worstWeek.weekLabel+'.' : '');
    html += '<p style="font-size:.78rem;color:#444;margin-top:10px">'+wkSummary+'</p></div>';
  }

  area.innerHTML = html;
}

// ── WEEKLY GROUPING AND COMPARISON ───────────────────────────────────────────
function groupByWeek(rows) {
  var weeks = { week1:[], week2:[], week3:[], week4:[], week5:[] };
  rows.forEach(function(r) {
    var day = r.dayOfMonth || r.day || (function(){
      var d = r.date || '';
      var m = d.match(/(\d{4})-(\d{2})-(\d{2})/);
      return m ? parseInt(m[3]) : null;
    })();
    if (!day) return;
    if (day <= 7)  weeks.week1.push(r);
    else if (day <= 14) weeks.week2.push(r);
    else if (day <= 21) weeks.week3.push(r);
    else if (day <= 28) weeks.week4.push(r);
    else weeks.week5.push(r);
  });
  return weeks;
}

function compareWeekly(bRows, aRows) {
  var bWeeks = groupByWeek(bRows);
  var aWeeks = groupByWeek(aRows);
  var weekDefs = [
    { key:'week1', label:'Semana 1 (1–7)' },
    { key:'week2', label:'Semana 2 (8–14)' },
    { key:'week3', label:'Semana 3 (15–21)' },
    { key:'week4', label:'Semana 4 (22–28)' },
    { key:'week5', label:'Semana 5 (29+)' }
  ];
  var result = [];
  weekDefs.forEach(function(wd, idx) {
    var bWk = bWeeks[wd.key] || [];
    var aWk = aWeeks[wd.key] || [];
    if (!bWk.length && !aWk.length) return;

    function avgOcc(rows) {
      var vals = rows.map(function(r){ return r.occ; }).filter(function(v){ return v !== null && v !== undefined; });
      return vals.length ? vals.reduce(function(s,v){ return s+v; }, 0) / vals.length : null;
    }
    function sumRooms(rows) {
      var vals = rows.map(function(r){ return r.rooms; }).filter(function(v){ return v !== null && v !== undefined; });
      return vals.length ? vals.reduce(function(s,v){ return s+v; }, 0) : null;
    }

    var beforeAvgOcc = avgOcc(bWk);
    var afterAvgOcc  = avgOcc(aWk);
    var avgPickup = (beforeAvgOcc !== null && afterAvgOcc !== null) ? afterAvgOcc - beforeAvgOcc : null;
    var beforeRoomsTotal = sumRooms(bWk);
    var afterRoomsTotal  = sumRooms(aWk);
    var roomPickupTotal  = (beforeRoomsTotal !== null && afterRoomsTotal !== null) ? afterRoomsTotal - beforeRoomsTotal : null;
    var status = pickupStatus(avgPickup);
    var daysCompared = Math.min(bWk.length, aWk.length);

    result.push({
      weekLabel: wd.label,
      weekNum: idx + 1,
      beforeAvgOcc: beforeAvgOcc,
      afterAvgOcc:  afterAvgOcc,
      avgPickup:    avgPickup,
      beforeRoomsTotal: beforeRoomsTotal,
      afterRoomsTotal:  afterRoomsTotal,
      roomPickupTotal:  roomPickupTotal,
      status: status,
      daysCompared: daysCompared
    });
  });
  return result;
}

function buildWeeklyMetrics(weeklyRows) {
  if (!weeklyRows || !weeklyRows.length) return null;
  var positiveWeeks = 0, negativeWeeks = 0, stableWeeks = 0;
  var pickupVals = [];
  var bestWeek = null, worstWeek = null;
  weeklyRows.forEach(function(w) {
    if (w.avgPickup !== null) {
      pickupVals.push(w.avgPickup);
      if (w.avgPickup > 2)  { positiveWeeks++; }
      else if (w.avgPickup < -2) { negativeWeeks++; }
      else stableWeeks++;
      if (!bestWeek  || w.avgPickup > bestWeek.avgPickup)  bestWeek  = w;
      if (!worstWeek || w.avgPickup < worstWeek.avgPickup) worstWeek = w;
    }
  });
  var avgWeeklyPickup = pickupVals.length ? pickupVals.reduce(function(s,v){ return s+v; },0) / pickupVals.length : null;
  var general = positiveWeeks > negativeWeeks ? 'Positivo' : negativeWeeks > positiveWeeks ? 'Negativo' : 'Mixto';
  return {
    totalWeeks: weeklyRows.length,
    positiveWeeks: positiveWeeks,
    negativeWeeks: negativeWeeks,
    stableWeeks: stableWeeks,
    avgWeeklyPickup: avgWeeklyPickup,
    bestWeek: bestWeek,
    worstWeek: worstWeek,
    general: general
  };
}

function otbRenderWeekly() {
  var wc = OTB_STATE.weeklyComparison;
  var wm = OTB_STATE.weeklyMetrics;
  var el = document.getElementById('otb-weekly-area');
  if (!el) return;
  if (!wc || !wc.length) { el.innerHTML = ''; return; }

  var hasRooms = wc.some(function(w){ return w.roomPickupTotal !== null; });
  var html = '<div style="margin-bottom:6px;font-size:.72rem;font-weight:700;color:var(--gray3);text-transform:uppercase;letter-spacing:.05em">Pickup Semanal</div>';
  html += '<div class="otb-table-wrap"><table class="otb-weekly-table"><thead><tr>'
    + '<th>Semana</th><th>Días comp.</th><th>Occ Base Prom.</th><th>Occ Actual Prom.</th><th>Pickup Prom. (pp)</th>';
  if (hasRooms) html += '<th>Habs Base</th><th>Habs Actual</th><th>Pickup Habs</th>';
  html += '<th>Estado</th><th>Indicador</th><th>Diagnóstico</th><th>Acción</th></tr></thead><tbody>';

  wc.forEach(function(w) {
    var trCls = '';
    if (w.status === 'strong-up' || w.status === 'moderate-up') trCls = 'week-positive';
    else if (w.status === 'strong-down') trCls = 'week-strong-negative';
    else if (w.status === 'moderate-down') trCls = 'week-negative';
    var pickupStr = w.avgPickup !== null ? (w.avgPickup > 0 ? '+' : '') + w.avgPickup.toFixed(1) + ' pp' : '—';
    html += '<tr class="'+trCls+'">'
      + '<td><strong>'+w.weekLabel+'</strong></td>'
      + '<td>'+w.daysCompared+'</td>'
      + '<td>'+(w.beforeAvgOcc !== null ? w.beforeAvgOcc.toFixed(1)+'%' : '—')+'</td>'
      + '<td>'+(w.afterAvgOcc  !== null ? w.afterAvgOcc.toFixed(1)+'%'  : '—')+'</td>'
      + '<td><strong>'+pickupStr+'</strong></td>';
    if (hasRooms) {
      html += '<td>'+(w.beforeRoomsTotal !== null ? Math.round(w.beforeRoomsTotal) : '—')+'</td>'
            + '<td>'+(w.afterRoomsTotal  !== null ? Math.round(w.afterRoomsTotal)  : '—')+'</td>'
            + '<td>'+(w.roomPickupTotal  !== null ? (w.roomPickupTotal > 0 ? '+' : '')+Math.round(w.roomPickupTotal)+' habs' : '—')+'</td>';
    }
    html += '<td>'+pickupLabel(w.status)+'</td>'
          + '<td>'+pickupIcon(w.avgPickup)+'</td>'
          + '<td style="font-size:.7rem;color:#555">'+pickupLabel(w.status)+'</td>'
          + '<td style="font-size:.68rem;color:#555;max-width:160px">'+pickupAction(w.status)+'</td>'
          + '</tr>';
  });
  html += '</tbody>';
  if (wm) {
    html += '<tfoot><tr>'
      + '<td colspan="2">Resumen semanal</td>'
      + '<td>—</td><td>—</td>'
      + '<td>'+(wm.avgWeeklyPickup !== null ? (wm.avgWeeklyPickup > 0 ? '+' : '')+wm.avgWeeklyPickup.toFixed(1)+' pp prom.' : '—')+'</td>';
    if (hasRooms) html += '<td colspan="3">—</td>';
    html += '<td colspan="4">'+wm.positiveWeeks+' positivas · '+wm.negativeWeeks+' negativas · '+wm.stableWeeks+' estables</td>'
      + '</tr></tfoot>';
  }
  html += '</table></div>';
  el.innerHTML = html;
}

function otbSaveToHistory() {
  if (!OTB_STATE.metrics) { otbShowError('No hay comparativa activa para guardar'); return; }
  const m = OTB_STATE.metrics;
  const entry = {
    id: Date.now(),
    hotel: currentHotel,
    month: new Date().toLocaleDateString('es-CO',{year:'numeric',month:'long'}),
    date: new Date().toLocaleDateString('es-CO'),
    total: m.total, up: m.up, down: m.down, stable: m.stable,
    avgOcc: m.avgOcc, avgAdr: m.avgAdr, avgRevpar: m.avgRevpar,
    general: m.general,
    weeklyMetrics: OTB_STATE.weeklyMetrics || null
  };
  OTB_STATE.history.unshift(entry);
  localStorage.setItem('otb_history', JSON.stringify(OTB_STATE.history.slice(0,50)));
  otbRenderHistory();
  alert('✓ Guardado en el histórico mensual');
}

function otbRenderHistory() {
  const area = document.getElementById('otb-history-area');
  if (!area) return;
  if (!OTB_STATE.history.length) {
    area.innerHTML = '<p style="color:var(--gray3);padding:20px">No hay comparativas guardadas aún. Ejecute una comparativa y presione "Guardar en histórico".</p>';
    return;
  }
  let html = '<div class="otb-card"><div class="otb-card-title">Histórico de comparativas OTB ('+OTB_STATE.history.length+')</div>'
    + '<div class="otb-table-wrap"><table class="otb-hist-table"><thead><tr>'
    + '<th>Fecha análisis</th><th>Hotel</th><th>Mes</th><th>Fechas</th><th>Subieron</th><th>Bajaron</th><th>Estables</th>'
    + '<th>Var. Ocup</th><th>Var. ADR</th><th>Var. RevPAR</th><th>Estado</th><th></th>'
    + '</tr></thead><tbody>';
  OTB_STATE.history.forEach(function(e) {
    const stColor = e.general==='Positivo'?'#1a6e3c':e.general==='Negativo'?'#c00':'#856404';
    html += '<tr>'
      + '<td>'+e.date+'</td><td>'+e.hotel+'</td><td>'+e.month+'</td>'
      + '<td>'+e.total+'</td>'
      + '<td style="color:#1a6e3c;font-weight:700">'+e.up+'</td>'
      + '<td style="color:#c00;font-weight:700">'+e.down+'</td>'
      + '<td>'+e.stable+'</td>'
      + '<td>'+(e.avgOcc!==null&&e.avgOcc!==undefined?fmtPct(e.avgOcc):'N/D')+'</td>'
      + '<td>'+(e.avgAdr!==null&&e.avgAdr!==undefined?fmtCOP(e.avgAdr):'N/D')+'</td>'
      + '<td>'+(e.avgRevpar!==null&&e.avgRevpar!==undefined?fmtCOP(e.avgRevpar):'N/D')+'</td>'
      + '<td style="color:'+stColor+';font-weight:700">'+e.general+'</td>'
      + '<td><button class="otb-btn danger" style="padding:2px 8px;font-size:.65rem" onclick="otbDeleteHistory('+e.id+')">✕</button></td>'
      + '</tr>';
  });
  html += '</tbody></table></div></div>';
  area.innerHTML = html;
}

function otbDeleteHistory(id) {
  OTB_STATE.history = OTB_STATE.history.filter(function(e){ return e.id !== id; });
  localStorage.setItem('otb_history', JSON.stringify(OTB_STATE.history));
  otbRenderHistory();
}

function otbExportExcel() {
  if (!OTB_STATE.comparison) { otbShowError('No hay datos para exportar'); return; }
  const m = OTB_STATE.metrics;
  const wb = XLSX.utils.book_new();

  const resumen = [
    ['Revenue Master Dashboard — GEH Suites'],
    ['Comparativa OTB', '', currentHotel],
    ['Fecha exportación', new Date().toLocaleDateString('es-CO')],
    [],
    ['Indicador','Valor'],
    ['Total fechas', m.total], ['Fechas subieron', m.up], ['Fechas bajaron', m.down], ['Fechas estables', m.stable],
    ['Var. prom. Ocupación (pp)', m.avgOcc!==null?m.avgOcc.toFixed(2):'N/D'],
    ['Var. prom. ADR', m.avgAdr!==null?m.avgAdr.toFixed(0):'N/D'],
    ['Var. prom. RevPAR', m.avgRevpar!==null?m.avgRevpar.toFixed(0):'N/D'],
    ['Estado general', m.general]
  ];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(resumen), 'Resumen OTB');

  const comp = [['Fecha','Ocup Antes','Ocup Después','Var Ocup','Hab Antes','Hab Después','Var Hab','ADR Antes','ADR Después','Var ADR','RevPAR Antes','RevPAR Después','Var RevPAR','Estado']];
  OTB_STATE.comparison.forEach(function(r) {
    comp.push([
      r.date,
      r.b&&r.b.occ!==null?r.b.occ.toFixed(1):'', r.a&&r.a.occ!==null?r.a.occ.toFixed(1):'', r.occ&&r.occ.abs!==null?r.occ.abs.toFixed(1):'',
      r.b&&r.b.rooms!==null?r.b.rooms:'', r.a&&r.a.rooms!==null?r.a.rooms:'', r.rooms&&r.rooms.abs!==null?r.rooms.abs.toFixed(0):'',
      r.b&&r.b.adr!==null?r.b.adr.toFixed(0):'', r.a&&r.a.adr!==null?r.a.adr.toFixed(0):'', r.adr&&r.adr.abs!==null?r.adr.abs.toFixed(0):'',
      r.b&&r.b.revpar!==null?r.b.revpar.toFixed(0):'', r.a&&r.a.revpar!==null?r.a.revpar.toFixed(0):'', r.revpar&&r.revpar.abs!==null?r.revpar.abs.toFixed(0):'',
      r.status
    ]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(comp), 'Comparativa Día a Día');

  const recs = [['Tipo','Título','Descripción','Prioridad']];
  (OTB_STATE.recs||[]).forEach(function(r){ recs.push([r.type, r.title, r.body, r.priority]); });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(recs), 'Recomendaciones Revenue');

  XLSX.writeFile(wb, 'OTB_Comparativa_'+currentHotel.replace(/ /g,'_')+'_'+new Date().toISOString().slice(0,10)+'.xlsx');
}
