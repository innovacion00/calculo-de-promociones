<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEH Suites — Simulador de Tarifas OTA</title>
<style>
  :root {
    --gold:#CE7E1F; --gold-dark:#AF762B; --gold-pale:#faf0e0;
    --gold-subtle:#fdf8f0; --gold-border:#e8c88a; --white:#ffffff;
    --off-white:#f7f4f0; --gray1:#f2f2f2; --gray2:#e4e4e4;
    --gray3:#999; --gray4:#666; --text:#2a2a2a;
    --green:#1a6e3c; --green-bg:#d4edda; --blue:#14427a;
    --blue-bg:#d0e4f7; --border:#e0d8cc; --radius:8px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;background:var(--off-white);color:var(--text);min-height:100vh;}

  /* HEADER */
  header{background:var(--white);display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:64px;border-bottom:2px solid var(--gold-border);box-shadow:0 2px 10px rgba(175,118,43,.10);position:sticky;top:0;z-index:200;}
  .header-logo{display:flex;align-items:center;gap:16px;}
  .logo-svg{height:40px;width:auto;}
  .header-title{border-left:1.5px solid var(--gold-border);padding-left:16px;}
  .header-title h1{color:var(--gold-dark);font-size:.95rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}
  .header-title p{color:var(--gray3);font-size:.68rem;letter-spacing:.5px;margin-top:2px;}
  .header-badge{background:var(--gold-pale);border:1.5px solid var(--gold-border);border-radius:20px;padding:4px 12px;color:var(--gold-dark);font-size:.68rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;}

  /* HOTEL SIDEBAR */
  .sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s;}
  .sidebar-overlay.open{opacity:1;pointer-events:all;}
  .hotel-sidebar{position:fixed;top:0;left:0;height:100vh;width:280px;background:var(--white);border-right:2px solid var(--gold-border);box-shadow:4px 0 24px rgba(175,118,43,.18);z-index:400;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);}
  .hotel-sidebar.open{transform:translateX(0);}
  .sidebar-head{background:var(--gold-pale);border-bottom:2px solid var(--gold-border);padding:18px 18px 14px;display:flex;align-items:center;justify-content:space-between;}
  .sidebar-head-title{font-size:.8rem;font-weight:800;color:var(--gold-dark);letter-spacing:1.2px;text-transform:uppercase;}
  .sidebar-close{width:28px;height:28px;border:none;background:var(--gold-border);border-radius:50%;cursor:pointer;font-size:.9rem;color:var(--gold-dark);display:flex;align-items:center;justify-content:center;transition:background .15s;}
  .sidebar-close:hover{background:var(--gold);}
  .sidebar-list{overflow-y:auto;flex:1;padding:10px 10px;}
  .sidebar-list::-webkit-scrollbar{width:4px;}
  .sidebar-list::-webkit-scrollbar-thumb{background:var(--gold-border);border-radius:4px;}
  .hotel-item{display:block;width:100%;text-align:left;padding:10px 14px;border:none;border-radius:8px;background:none;font-size:.82rem;font-weight:600;color:var(--gray4);cursor:pointer;transition:all .15s;margin-bottom:3px;}
  .hotel-item:hover{background:var(--gold-subtle);color:var(--gold-dark);}
  .hotel-item.active{background:var(--gold-pale);color:var(--gold-dark);font-weight:800;border-left:3px solid var(--gold);padding-left:11px;}
  /* toggle button in header */
  .hotel-toggle-btn{display:flex;align-items:center;gap:8px;padding:7px 14px;background:var(--gold-pale);border:1.5px solid var(--gold-border);border-radius:20px;cursor:pointer;transition:all .15s;color:var(--gold-dark);}
  .hotel-toggle-btn:hover{background:var(--gold-subtle);border-color:var(--gold);}
  .hotel-toggle-btn .htb-icon{font-size:1rem;}
  .hotel-toggle-btn .htb-name{font-size:.74rem;font-weight:700;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hotel-toggle-btn .htb-arrow{font-size:.65rem;opacity:.7;}

  /* CHANNEL TABS */
  .channel-tabs{background:var(--white);display:flex;overflow-x:auto;border-bottom:2px solid var(--gold-border);scrollbar-width:none;box-shadow:0 2px 6px rgba(175,118,43,.06);position:sticky;top:116px;z-index:100;}
  .channel-tabs::-webkit-scrollbar{display:none;}
  .channel-tab{padding:12px 22px;border:none;background:none;font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;color:var(--gray4);transition:all .2s;letter-spacing:.8px;text-transform:uppercase;margin-bottom:-2px;}
  .channel-tab:hover{color:var(--gold);background:var(--gold-subtle);}
  .channel-tab.active{color:var(--gold);border-bottom-color:var(--gold);background:var(--gold-subtle);}

  /* CONTENT */
  .content{padding:20px 24px;max-width:1600px;margin:0 auto;}
  .channel-page{display:none;}
  .channel-page.active{display:block;}

  /* INPUT BAR */
  .input-bar{background:var(--white);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(175,118,43,.08);border:1.5px solid var(--gold-border);}
  .input-group{display:flex;flex-direction:column;gap:3px;}
  .input-group label{color:var(--gold-dark);font-size:.68rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;}
  .input-group input[type=number],.input-group input[type=text]{background:var(--off-white);border:1.5px solid var(--gold-border);border-radius:6px;padding:7px 12px;font-size:1rem;font-weight:700;color:var(--text);transition:border-color .2s,box-shadow .2s;}
  .input-group input[type=number]{width:180px;}
  .input-group input[type=text]{width:200px;}
  .input-group input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(206,126,31,.15);}
  .commission-input{width:72px!important;font-size:.92rem!important;}
  .input-divider{width:1.5px;height:44px;background:var(--gold-border);}
  .base-rates{display:flex;gap:8px;flex-wrap:wrap;flex:1;}
  .base-rate-chip{background:var(--gold-pale);border:1px solid var(--gold-border);border-radius:16px;padding:5px 12px;display:flex;flex-direction:column;gap:1px;}
  .chip-label{color:var(--gold-dark);font-size:.6rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;}
  .chip-val{color:var(--text);font-weight:700;font-size:.84rem;}

  /* LEGEND + ADD PROMO */
  .toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
  .legend{display:flex;gap:16px;font-size:.74rem;flex-wrap:wrap;color:var(--gray4);align-items:center;}
  .legend-item{display:flex;align-items:center;gap:6px;}
  .legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
  .add-promo-btn{padding:6px 16px;background:var(--gold-pale);border:1.5px dashed var(--gold);border-radius:20px;color:var(--gold-dark);font-size:.76rem;font-weight:700;cursor:pointer;transition:all .15s;}
  .add-promo-btn:hover{background:var(--gold-subtle);border-style:solid;}

  /* SECTIONS GRID */
  .sections-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;}

  /* SECTION CARD */
  .section-card{background:var(--white);border-radius:var(--radius);box-shadow:0 2px 8px rgba(175,118,43,.07);overflow:visible;border:1px solid var(--gold-border);}
  .section-card .section-header{border-radius:var(--radius) var(--radius) 0 0;}
  .section-card .table-wrap{border-radius:0 0 var(--radius) var(--radius);}
  .section-card.pt-full{grid-column:1/-1;}

  /* SECTION HEADER */
  .section-header{background:var(--white);border-bottom:2px solid var(--gold-border);padding:9px 14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .section-header::before{content:'';display:block;width:4px;height:13px;background:var(--gold);border-radius:2px;flex-shrink:0;}
  .section-title{flex:1;font-size:.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold-dark);min-width:80px;outline:none;border-bottom:1px dashed transparent;cursor:text;padding:1px 2px;}
  .section-title:focus{border-bottom-color:var(--gold);}
  .promo-ctrl{display:flex;align-items:center;gap:5px;background:rgba(206,126,31,.10);border:1px solid var(--gold-border);border-radius:20px;padding:2px 9px;}
  .promo-ctrl label{font-size:.63rem;font-weight:700;color:var(--gold-dark);letter-spacing:.8px;text-transform:uppercase;white-space:nowrap;}
  .promo-input{width:48px;border:none;border-bottom:1.5px solid var(--gold);background:transparent;font-size:.85rem;font-weight:800;color:var(--gold-dark);text-align:center;padding:1px 2px;outline:none;-moz-appearance:textfield;}
  .promo-input::-webkit-inner-spin-button,.promo-input::-webkit-outer-spin-button{-webkit-appearance:none;}
  .promo-pct{font-size:.8rem;font-weight:700;color:var(--gold-dark);}
  .icon-btn{width:24px;height:24px;border:none;border-radius:50%;background:var(--gray1);color:var(--gray4);font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
  .icon-btn:hover{background:var(--gold-border);color:var(--gold-dark);}
  .icon-btn.del:hover{background:#fde;color:#c00;}

  /* CONFIG PANEL */
  .cfg-panel{border-top:1.5px solid var(--gold-border);background:#fffcf5;padding:10px 14px;display:none;}
  .cfg-panel.open{display:block;}
  .cfg-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--gray2);}
  .cfg-row:last-of-type{border-bottom:none;}
  .cfg-row-label{flex:1;font-size:.78rem;}
  .cfg-row-label input{width:100%;border:none;border-bottom:1px solid var(--gold-border);background:transparent;font-size:.78rem;color:var(--text);padding:1px 3px;outline:none;}
  .cfg-row-label input:focus{border-bottom-color:var(--gold);}
  .cfg-pct{display:flex;align-items:center;gap:3px;}
  .cfg-pct input{width:48px;border:1px solid var(--gold-border);border-radius:4px;background:var(--off-white);font-size:.78rem;font-weight:700;text-align:center;padding:2px 4px;color:var(--gold-dark);outline:none;-moz-appearance:textfield;}
  .cfg-pct input::-webkit-inner-spin-button,.cfg-pct input::-webkit-outer-spin-button{-webkit-appearance:none;}
  .cfg-pct span{font-size:.72rem;color:var(--gold-dark);}
  .cfg-add-btn{margin-top:8px;width:100%;padding:5px;background:none;border:1.5px dashed var(--gold-border);border-radius:6px;color:var(--gold-dark);font-size:.74rem;font-weight:600;cursor:pointer;transition:all .15s;}
  .cfg-add-btn:hover{background:var(--gold-pale);border-color:var(--gold);}

  /* TABLE */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table{width:100%;min-width:360px;border-collapse:collapse;font-size:.76rem;}
  thead th{background:var(--gold-pale);padding:5px 7px;text-align:right;font-size:.63rem;font-weight:800;color:var(--gold-dark);border-bottom:1.5px solid var(--gold-border);white-space:nowrap;letter-spacing:.3px;text-transform:uppercase;}
  thead th:first-child{text-align:left;}
  tbody tr:nth-child(even){background:#fdfaf6;}
  tbody tr:hover{background:var(--gold-subtle);}
  td{padding:5px 7px;text-align:right;color:#444;white-space:nowrap;}
  td:first-child{text-align:left;color:#333;font-size:.73rem;font-weight:500;max-width:130px;white-space:normal;line-height:1.3;}
  .td-base{color:#aaa;font-size:.78rem;}
  .td-mid{color:#888;font-size:.78rem;}
  .td-ota{background:var(--green-bg);color:var(--green);font-weight:800;cursor:pointer;border-radius:4px;font-size:.83rem;transition:filter .15s,transform .1s;user-select:none;}
  .td-ota::after{content:'⧉';font-size:.6rem;margin-left:4px;opacity:.5;}
  .td-ota:hover{filter:brightness(.93);transform:scale(1.02);}
  .td-net{background:var(--blue-bg);color:var(--blue);font-weight:800;font-size:.83rem;}
  tr.pair-sep td{border-bottom:2px solid var(--gold-border)!important;}

  /* PRICE TRAVEL MERGED */
  .pt-merged-body{padding:0 14px 14px;}
  .pt-comparison{background:linear-gradient(135deg,#fffbf0,#fdf5e0);border:1.5px solid var(--gold-border);border-radius:8px;padding:10px 14px;margin:10px 0;display:flex;gap:20px;flex-wrap:wrap;align-items:center;}
  .pt-cmp-item{display:flex;flex-direction:column;gap:2px;}
  .pt-cmp-label{font-size:.62rem;font-weight:700;color:var(--gold-dark);text-transform:uppercase;letter-spacing:.8px;}
  .pt-cmp-val{font-size:.9rem;font-weight:800;color:var(--text);}
  .pt-cmp-diff{font-size:.82rem;font-weight:700;color:#c00;}
  .pt-tables{display:grid;grid-template-columns:1fr 1fr;gap:12px;overflow-x:auto;}
  .pt-tables>div{overflow-x:auto;}
  .pt-sub-label{font-size:.67rem;font-weight:800;color:var(--gold-dark);text-transform:uppercase;letter-spacing:.8px;padding:6px 0 4px;border-bottom:1.5px solid var(--gold-border);margin-bottom:4px;}
  @media(max-width:900px){.pt-tables{grid-template-columns:1fr;}}

  /* TOAST */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--white);border:1.5px solid var(--gold);color:var(--gold-dark);padding:9px 20px;border-radius:24px;font-size:.82rem;font-weight:700;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:9999;box-shadow:0 4px 20px rgba(175,118,43,.18);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media(max-width:640px){.sections-grid{grid-template-columns:1fr;}.content{padding:12px;}.pt-tables{grid-template-columns:1fr;}}

  /* MODULE NAV BAR */
  .module-nav{background:var(--white);border-bottom:2px solid var(--gold-border);position:sticky;top:64px;z-index:150;box-shadow:0 2px 8px rgba(175,118,43,.08);}
  .module-nav-inner{max-width:1600px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:4px;}
  .module-nav-btn{display:flex;align-items:center;gap:7px;padding:12px 20px;border:none;background:none;font-size:.78rem;font-weight:700;color:var(--gray3);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;letter-spacing:.5px;white-space:nowrap;}
  .module-nav-btn:hover{color:var(--gold-dark);background:var(--gold-subtle);}
  .module-nav-btn.active{color:var(--gold-dark);border-bottom-color:var(--gold);background:var(--gold-subtle);}
  .module-nav-btn .mnb-icon{font-size:1rem;}
  .module-nav-btn .mnb-label{text-transform:uppercase;}
  .module-nav-future{margin-left:auto;font-size:.65rem;color:var(--gray2);font-style:italic;letter-spacing:.5px;}

  /* ACTION BAR */
  .action-bar{display:flex;align-items:center;gap:8px;padding:7px 24px;background:var(--gold-subtle);border-bottom:1px solid var(--gold-border);}
  .save-btn{padding:5px 14px;border-radius:16px;border:1.5px solid var(--gold-border);background:var(--gold-pale);color:var(--gold-dark);font-size:.74rem;font-weight:700;cursor:pointer;transition:all .15s;}
  .save-btn:hover{background:var(--gold);color:#fff;}
  .save-btn.primary{background:var(--gold);color:#fff;border-color:var(--gold-dark);}
  .save-btn.primary:hover{background:var(--gold-dark);}
  .save-status{font-size:.7rem;color:var(--gray3);margin-left:4px;}
/* OTB MODULE */
.otb-section{padding:20px 24px;}
.otb-header{margin-bottom:20px;}
.otb-header h2{color:var(--gold-dark);font-size:1.1rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;}
.otb-header p{color:var(--gray3);font-size:.75rem;margin-top:4px;}
.otb-upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
@media(max-width:700px){.otb-upload-grid{grid-template-columns:1fr;}}
.otb-upload-card{background:var(--white);border:2px dashed var(--gold-border);border-radius:var(--radius);padding:24px;text-align:center;transition:all .2s;cursor:pointer;}
.otb-upload-card.has-file{border-style:solid;border-color:var(--gold);}
.otb-upload-card:hover{border-color:var(--gold);background:var(--gold-subtle);}
.otb-upload-title{font-size:.8rem;font-weight:800;color:var(--gold-dark);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.otb-upload-icon{font-size:2rem;margin-bottom:8px;}
.otb-upload-hint{font-size:.72rem;color:var(--gray3);margin-top:6px;}
.otb-file-name{font-size:.76rem;color:var(--gold-dark);font-weight:700;margin-top:8px;word-break:break-all;}
.otb-btn{padding:6px 16px;border-radius:16px;border:1.5px solid var(--gold-border);background:var(--gold-pale);color:var(--gold-dark);font-size:.74rem;font-weight:700;cursor:pointer;transition:all .15s;margin:4px;}
.otb-btn:hover{background:var(--gold);color:#fff;}
.otb-btn.primary{background:var(--gold);color:#fff;border-color:var(--gold-dark);}
.otb-btn.primary:hover{background:var(--gold-dark);}
.otb-btn.danger{border-color:#fcc;color:#c00;}
.otb-btn.danger:hover{background:#c00;color:#fff;}
.otb-kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
.otb-kpi{background:var(--white);border:1px solid var(--gold-border);border-radius:var(--radius);padding:14px;text-align:center;}
.otb-kpi-label{font-size:.65rem;font-weight:700;color:var(--gray3);text-transform:uppercase;letter-spacing:.8px;}
.otb-kpi-value{font-size:1.4rem;font-weight:800;color:var(--gold-dark);margin:4px 0;}
.otb-kpi-sub{font-size:.68rem;color:var(--gray3);}
.otb-kpi.up .otb-kpi-value{color:#1a6e3c;}
.otb-kpi.down .otb-kpi-value{color:#c00;}
.otb-table-wrap{overflow-x:auto;background:var(--white);border:1px solid var(--gold-border);border-radius:var(--radius);margin-bottom:20px;}
.otb-table{width:100%;border-collapse:collapse;font-size:.75rem;min-width:900px;}
.otb-table thead th{background:var(--gold-pale);padding:6px 8px;text-align:center;font-size:.62rem;font-weight:800;color:var(--gold-dark);border-bottom:1.5px solid var(--gold-border);white-space:nowrap;}
.otb-table tbody td{padding:5px 8px;text-align:center;border-bottom:1px solid var(--gray2);}
.otb-table tbody tr:hover{background:var(--gold-subtle);}
.ind-up{color:#1a6e3c;font-weight:800;}
.ind-down{color:#c00;font-weight:800;}
.ind-same{color:#888;}
.otb-card{background:var(--white);border:1px solid var(--gold-border);border-radius:var(--radius);padding:16px;margin-bottom:16px;}
.otb-card-title{font-size:.78rem;font-weight:800;color:var(--gold-dark);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;border-bottom:1.5px solid var(--gold-border);padding-bottom:6px;}
.otb-chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
@media(max-width:900px){.otb-chart-grid{grid-template-columns:1fr;}}
.otb-chart-box{background:var(--white);border:1px solid var(--gold-border);border-radius:var(--radius);padding:16px;}
.otb-chart-title{font-size:.74rem;font-weight:800;color:var(--gold-dark);margin-bottom:12px;text-transform:uppercase;letter-spacing:.6px;}
.otb-rec{border-left:4px solid var(--gold);padding:10px 14px;margin-bottom:10px;background:var(--gold-subtle);border-radius:0 var(--radius) var(--radius) 0;}
.otb-rec.positive{border-color:#1a6e3c;background:#f0faf4;}
.otb-rec.negative{border-color:#c00;background:#fff5f5;}
.otb-rec.warning{border-color:#e6a817;background:#fffbf0;}
.otb-rec-title{font-size:.76rem;font-weight:800;color:var(--text);margin-bottom:4px;}
.otb-rec-body{font-size:.73rem;color:#555;line-height:1.5;}
.otb-rec-priority{font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block;margin-top:4px;}
.otb-rec-priority.high{background:#fde;color:#c00;}
.otb-rec-priority.medium{background:#fff3cd;color:#856404;}
.otb-rec-priority.low{background:#d4edda;color:#1a6e3c;}
.otb-alert{padding:12px 16px;border-radius:var(--radius);margin-bottom:12px;font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:8px;}
.otb-alert.green{background:#d4edda;color:#1a6e3c;border:1px solid #b8ddc8;}
.otb-alert.red{background:#fde;color:#c00;border:1px solid #f5c6cb;}
.otb-alert.yellow{background:#fff3cd;color:#856404;border:1px solid #ffeaa7;}
.otb-alert.gray{background:var(--gray1);color:var(--gray4);border:1px solid var(--gray2);}
.otb-map-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
@media(max-width:600px){.otb-map-grid{grid-template-columns:1fr;}}
.otb-map-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--gray2);}
.otb-map-row label{flex:1;font-size:.76rem;font-weight:600;color:var(--gray4);}
.otb-map-row select{flex:1.5;padding:4px 6px;border:1px solid var(--gold-border);border-radius:4px;font-size:.75rem;background:var(--off-white);color:var(--text);}
.otb-hist-table{width:100%;border-collapse:collapse;font-size:.74rem;}

<script>
// ── HOTELS ──────────────────────────────────────────────────────────────────
const HOTELS = [

  'Hotel Aixo Suites','Hotel Abi Inn','Hotel Boquilla Suites',
  'Hotel Marina Suites','Hotel Avexi Suites','Hotel Azuan Suites',
  'Hotel El Marques'
];
let currentHotel = HOTELS[0];
let currentChannelKey = '';
const hotelBaseInputs = {};
const hotelRoomNames  = {};
const hotelPlanPcts = {}; // {hotel: {`${secId}_${rowIdx}`: pct}}
const hotelPaisPcts = {}; // {hotel: {secId: pct}}

// ── UTILS ───────────────────────────────────────────────────────────────────
const fmt = n => '$ ' + Math.round(n).toLocaleString('es-CO');

function applySteps(base, discounts) {
  let v = base; const vals = [base];
  for (const d of discounts) { v = v*(1-d); vals.push(v); }
  return vals;
}

function getPlanPct(sec, rowIdx, defaultPct) {
  return hotelPlanPcts[currentHotel]?.[sec._id+'_'+rowIdx] ?? defaultPct;
}
function setPlanPct(sec, rowIdx, pct) {
  if (!hotelPlanPcts[currentHotel]) hotelPlanPcts[currentHotel] = {};
  hotelPlanPcts[currentHotel][sec._id+'_'+rowIdx] = pct;
}

function getPaisPct(sec) {
  return hotelPaisPcts[currentHotel]?.[sec._id] ?? 5;
}
function setPaisPct(sec, pct) {
  if (!hotelPaisPcts[currentHotel]) hotelPaisPcts[currentHotel] = {};
  hotelPaisPcts[currentHotel][sec._id] = pct;
}

function effectiveDiscounts(row, promoDisc, sec, rowIdx) {
  const discs = [...row.discounts];
  const idx = row.promoIdx !== undefined ? row.promoIdx : discs.length-1;
  // Per-hotel plan pct override
  if (sec !== undefined && rowIdx !== undefined && discs.length > 1) {
    const overridePct = getPlanPct(sec, rowIdx, row.planPct ?? discs[0]*100);
    discs[0] = overridePct / 100;
  }
  // País pct override
  const paisAdd = (row.promoAdd && sec !== undefined) ? getPaisPct(sec)/100 : (row.promoAdd||0);
  discs[idx] = promoDisc + paisAdd + (row.nocheAdd||0);
  return discs;
}

function copyValue(val) {
  const text = String(Math.round(val));
  if (navigator.clipboard) navigator.clipboard.writeText(text);
  else { const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }
  const toast = document.getElementById('toast');
  toast.textContent = '✓  Copiado  '+fmt(val);
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),2200);
}

function getPromoVal(sec) {
  if (!sec._promoVals) sec._promoVals = {};
  if (sec._promoVals[currentHotel] === undefined) sec._promoVals[currentHotel] = sec.promoDefault;
  return sec._promoVals[currentHotel];
}
function setPromoVal(sec, v) {
  if (!sec._promoVals) sec._promoVals = {};
  sec._promoVals[currentHotel] = v;
}

// ── BASE RATE COMPUTATION ────────────────────────────────────────────────────
function getBaseRates(ch, input) {
  const pub = input * ch.factor;
  const rates = {};
  ch.baseKeys.forEach((key, i) => {
    if (ch.priceTravel && key==='stdC') rates[key] = pub / 0.75;
    else if (ch.priceTravel && key==='nrC') rates[key] = (pub*0.88)/0.75;
    else rates[key] = pub * ch.baseFactors[i];
  });
  return rates;
}

// ── RENDER TABLE ─────────────────────────────────────────────────────────────
function renderTable(card, sec, baseRates, commission, promoDisc) {
  const old = card.querySelector('table');
  if (old) old.remove();

  const effRows = sec.rows || [];
  const maxDisc = Math.max(...effRows.map((r, ri) => effectiveDiscounts(r, promoDisc, sec, ri).length));
  const table = document.createElement('table');
  const colH = sec.colHeaders || [];

  // thead
  const thead = document.createElement('thead');
  const trh = document.createElement('tr');
  addTh(trh, colH[0]||'Plan', '', colH, 0);
  addTh(trh, colH[1]||'Base', '', colH, 1);
  for (let i=1; i<maxDisc; i++) addTh(trh, colH[1+i]||`Paso ${i+1}`, '', colH, 1+i);
  const otaIdx = colH.length-(commission>0?2:1);
  addTh(trh, colH[otaIdx], 'color:var(--green);font-weight:900', colH, otaIdx);
  if (commission>0) addTh(trh, colH[colH.length-1], 'color:var(--blue);font-weight:900', colH, colH.length-1);
  thead.appendChild(trh); table.appendChild(thead);

  // tbody
  const tbody = document.createElement('tbody');
  effRows.forEach((row, ri) => {
    const bv = baseRates[row.base]||0;
    const discs = effectiveDiscounts(row, promoDisc, sec, ri);
    const vals = applySteps(bv, discs);
    const otaVal = vals[vals.length-1];
    const netVal = commission>0 ? otaVal*(1-commission) : null;

    const trow = document.createElement('tr');
    if (sec.pairGroup && (ri+1)%sec.pairGroup===0) trow.classList.add('pair-sep');

    addTd(trow, row.label, '');
    addTd(trow, fmt(bv), 'td-base');
    for (let i=1; i<discs.length; i++) addTd(trow, fmt(vals[i]), 'td-mid');
    for (let i=discs.length; i<maxDisc; i++) addTd(trow, '—', 'td-mid');

    const tdOta = addTd(trow, fmt(otaVal), 'td-ota');
    tdOta.title='Clic para copiar';
    tdOta.addEventListener('click', ()=>copyValue(otaVal));
    if (commission>0 && netVal!==null) addTd(trow, fmt(netVal), 'td-net');

    tbody.appendChild(trow);
  });
  table.appendChild(tbody);
  const wrap=document.createElement('div');wrap.className='table-wrap';
  wrap.appendChild(table);card.appendChild(wrap);
}

// ── RENDER PRICE TRAVEL MERGED ───────────────────────────────────────────────
function renderPTMerged(card, sec, baseRates, promoDisc) {
  const old = card.querySelector('.pt-merged-body');
  if (old) old.remove();

  const body = document.createElement('div');
  body.className = 'pt-merged-body';

  // Comparison box: STD SIN COMI vs NR SIN COMI
  const sinRows = sec.rowsSin||[];
  const stdRow = sinRows.find(r=>r.base==='std');
  const nrRow  = sinRows.find(r=>r.base==='nr');
  if (stdRow && nrRow) {
    const stdIdx  = sinRows.indexOf(stdRow);
    const nrIdx   = sinRows.indexOf(nrRow);
    const stdVals = applySteps(baseRates['std']||0, effectiveDiscounts(stdRow, promoDisc, sec, stdIdx));
    const nrVals  = applySteps(baseRates['nr']||0,  effectiveDiscounts(nrRow,  promoDisc, sec, nrIdx));
    const stdTar  = stdVals[stdVals.length-1];
    const nrTar   = nrVals[nrVals.length-1];
    const diff    = stdTar > 0 ? ((nrTar/stdTar)-1)*100 : 0;

    const sinStdC = applySteps(baseRates['stdC']||0, effectiveDiscounts({...stdRow,base:'stdC'}, promoDisc, sec, stdIdx));
    const sinNrC  = applySteps(baseRates['nrC']||0,  effectiveDiscounts({...nrRow,base:'nrC'},   promoDisc, sec, nrIdx));

    body.innerHTML = `
      <div class="pt-comparison">
        <div class="pt-cmp-item"><div class="pt-cmp-label">STD sin comi</div><div class="pt-cmp-val">${fmt(stdTar)}</div></div>
        <div class="pt-cmp-item"><div class="pt-cmp-label">NR sin comi</div><div class="pt-cmp-val">${fmt(nrTar)}</div></div>
        <div class="pt-cmp-item"><div class="pt-cmp-label">Diferencia</div><div class="pt-cmp-diff">${diff.toFixed(1)}%</div></div>
        <div class="pt-cmp-item"><div class="pt-cmp-label">STD con comi</div><div class="pt-cmp-val">${fmt(sinStdC[sinStdC.length-1])}</div></div>
        <div class="pt-cmp-item"><div class="pt-cmp-label">NR con comi</div><div class="pt-cmp-val">${fmt(sinNrC[sinNrC.length-1])}</div></div>
      </div>`;
  }

  // Two tables side by side
  const tables = document.createElement('div');
  tables.className = 'pt-tables';

  function makeSubTable(rows, label) {
    const wrap = document.createElement('div');
    wrap.innerHTML = `<div class="pt-sub-label">${label}</div>`;
    const tbl = document.createElement('table');
    const th = document.createElement('thead');
    const trh = document.createElement('tr');
    const ptH=['Plan','Base','Tarifa ▼']; addTh(trh,ptH[0],'',ptH,0); addTh(trh,ptH[1],'',ptH,1); addTh(trh,ptH[2],'color:var(--green);font-weight:900',ptH,2);
    th.appendChild(trh); tbl.appendChild(th);
    const tb = document.createElement('tbody');
    rows.forEach((row, ri) => {
      const bv = baseRates[row.base]||0;
      const discs = effectiveDiscounts(row, promoDisc, sec, ri);
      const vals = applySteps(bv, discs);
      const tarVal = vals[vals.length-1];
      const trow = document.createElement('tr');
      if (sec.pairGroup && (ri+1)%sec.pairGroup===0) trow.classList.add('pair-sep');
      addTd(trow, row.label, '');
      addTd(trow, fmt(bv), 'td-base');
      const tdT = addTd(trow, fmt(tarVal), 'td-ota');
      tdT.title='Clic para copiar';
      tdT.addEventListener('click', ()=>copyValue(tarVal));
      tb.appendChild(trow);
    });
    tbl.appendChild(tb);
    wrap.appendChild(tbl);
    return wrap;
  }

  tables.appendChild(makeSubTable(sec.rowsSin||[], 'SIN COMISIÓN'));
  tables.appendChild(makeSubTable(sec.rowsCon||[], 'CON COMISIÓN (÷0.75)'));
  body.appendChild(tables);
  card.appendChild(body);
}

// ── CONFIG PANEL ─────────────────────────────────────────────────────────────
function buildCfgPanel(sec, card, ch, baseRates, commission) {
  const panel = document.createElement('div');
  panel.className = 'cfg-panel';

  function buildRowList(rows, label) {
    if (label) { const h=document.createElement('div'); h.style.cssText='font-size:.68rem;font-weight:700;color:var(--gold-dark);text-transform:uppercase;letter-spacing:.8px;margin:6px 0 4px;'; h.textContent=label; panel.appendChild(h); }
    rows.forEach((row, ri) => {
      const rowEl = document.createElement('div');
      rowEl.className = 'cfg-row';
      const labelWrap = document.createElement('div');
      labelWrap.className = 'cfg-row-label';
      const labelInp = document.createElement('input');
      labelInp.type='text'; labelInp.value=row.label;
      labelInp.addEventListener('change', ()=>{ row.label=labelInp.value; reRender(card,sec,baseRates,commission,ch); });
      labelWrap.appendChild(labelInp);
      rowEl.appendChild(labelWrap);
      // plan %
      if (row.discounts && row.discounts.length>1) {
        const pp = document.createElement('div'); pp.className='cfg-pct';
        const pIn = document.createElement('input'); pIn.type='number'; pIn.value=Math.round(getPlanPct(sec, ri, row.planPct||row.discounts[0]*100)); pIn.min=0; pIn.max=100; pIn.step=1;
        pIn.addEventListener('change', ()=>{
          const pct = parseFloat(pIn.value)||0;
          setPlanPct(sec, ri, pct);
          reRender(card,sec,baseRates,commission,ch);
        });
        const sp=document.createElement('span'); sp.textContent='%';
        pp.appendChild(pIn); pp.appendChild(sp); rowEl.appendChild(pp);
      }
      const del=document.createElement('button'); del.className='icon-btn del'; del.textContent='✕';
      del.addEventListener('click',()=>{ rows.splice(ri,1); rebuildCfgPanel(panel,sec,card,ch,baseRates,commission); reRender(card,sec,baseRates,commission,ch); });
      rowEl.appendChild(del);
      panel.appendChild(rowEl);
    });
  }

  if (sec.ptMerged) {
    buildRowList(sec.rowsSin,'SIN COMISIÓN');
    const addSin=document.createElement('button'); addSin.className='cfg-add-btn'; addSin.textContent='+ Añadir plan SIN COMI';
    addSin.addEventListener('click',()=>{ sec.rowsSin.push({label:'Nuevo Plan',base:'std',discounts:[0],planPct:0}); sec.rowsCon.push({label:'Nuevo Plan',base:'stdC',discounts:[0],planPct:0}); rebuildCfgPanel(panel,sec,card,ch,baseRates,commission); reRender(card,sec,baseRates,commission,ch); });
    panel.appendChild(addSin);
  } else {
    buildRowList(sec.rows,'');
    const addBtn=document.createElement('button'); addBtn.className='cfg-add-btn'; addBtn.textContent='+ Añadir plan tarifario';
    addBtn.addEventListener('click',()=>{ sec.rows.push({label:'Nuevo Plan',base:ch.baseKeys[0],discounts:[0],planPct:0}); rebuildCfgPanel(panel,sec,card,ch,baseRates,commission); reRender(card,sec,baseRates,commission,ch); });
    panel.appendChild(addBtn);
  }
  return panel;
}

function rebuildCfgPanel(panel, sec, card, ch, baseRates, commission) {
  panel.innerHTML='';
  const newP = buildCfgPanel(sec, card, ch, baseRates, commission);
  panel.appendChild(...newP.childNodes);
}

function reRender(card, sec, baseRates, commission, ch) {
  if (sec.ptMerged) {
    renderPTMerged(card, sec, baseRates, getPromoVal(sec)/100);
  } else {
    renderTable(card, sec, baseRates, commission, getPromoVal(sec)/100);
  }
}

// ── BUILD SECTION CARD ───────────────────────────────────────────────────────
function buildSectionCard(ch, sec, baseRates, hotel) {
  const commission = ch._commission !== undefined ? ch._commission : ch.commission;
  const card = document.createElement('div');
  card.className = 'section-card' + (sec.ptMerged?' pt-full':'');

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'section-header';

  const bar = document.createElement('div'); bar.style.cssText='width:4px;height:13px;background:var(--gold);border-radius:2px;flex-shrink:0;';
  hdr.appendChild(bar);

  const titleEl = document.createElement('span');
  titleEl.className = 'section-title';
  titleEl.contentEditable = 'true';
  titleEl.textContent = sec.title;
  titleEl.addEventListener('blur', ()=>{ sec.title=titleEl.textContent.trim(); });
  hdr.appendChild(titleEl);

  const promoVal = getPromoVal(sec);
  const ctrl = document.createElement('div'); ctrl.className='promo-ctrl';
  ctrl.innerHTML = `<label>% Promo</label><input type="number" class="promo-input" value="${promoVal}" min="0" max="100" step="1"><span class="promo-pct">%</span>`;
  hdr.appendChild(ctrl);

  // País % control (only for sections with promoAdd rows)
  const hasPais = (sec.rows||[]).some(r=>r.promoAdd);
  if (hasPais) {
    const paisCtrl = document.createElement('div'); paisCtrl.className='promo-ctrl';
    paisCtrl.innerHTML = `<label>País %</label><input type="number" class="promo-input" value="${getPaisPct(sec)}" min="0" max="100" step="1"><span class="promo-pct">%</span>`;
    hdr.appendChild(paisCtrl);
    const paisIn = paisCtrl.querySelector('input');
    paisIn.addEventListener('change', ()=>{
      setPaisPct(sec, parseFloat(paisIn.value)||0);
      reRender(card, sec, baseRates, commission, ch);
    });
  }

  const cfgBtn = document.createElement('button'); cfgBtn.className='icon-btn'; cfgBtn.textContent='✏'; cfgBtn.title='Editar planes';
  hdr.appendChild(cfgBtn);

  const delBtn = document.createElement('button'); delBtn.className='icon-btn del'; delBtn.textContent='✕'; delBtn.title='Eliminar promoción';
  hdr.appendChild(delBtn);
  card.appendChild(hdr);

  // Config panel (hidden)
  const cfgPanel = buildCfgPanel(sec, card, ch, baseRates, commission);
  card.appendChild(cfgPanel);

  // Table / PT merged
  if (sec.ptMerged) renderPTMerged(card, sec, baseRates, promoVal/100);
  else renderTable(card, sec, baseRates, commission, promoVal/100);

  // Events
  ctrl.querySelector('.promo-input').addEventListener('input', e => {
    const v = parseFloat(e.target.value)||0;
    setPromoVal(sec, v);
    if (sec.ptMerged) renderPTMerged(card, sec, baseRates, v/100);
    else renderTable(card, sec, baseRates, commission, v/100);
  });

  cfgBtn.addEventListener('click', ()=>{ cfgPanel.classList.toggle('open'); });

  delBtn.addEventListener('click', ()=>{
    const idx = ch.sections.indexOf(sec);
    if (idx>=0) ch.sections.splice(idx,1);
    card.remove();
  });

  return card;
}

      <div class="input-group">
        <label>Tarifa base mínima por noche</label>
        <input type="number" id="inp-${ch.key}" value="240000" min="0" step="1000">
      </div>
      <div class="input-group">
        <label>Comisión del canal</label>
        <input type="number" class="commission-input" id="com-${ch.key}" value="${Math.round(commission*100)}" min="0" max="100" step="1">
      </div>
      <div class="input-divider"></div>
      <div class="base-rates" id="br-${ch.key}"></div>
    </div>
    <div class="toolbar">
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#d4edda;border:1.5px solid #1a6e3c"></div><span><strong>Tarifa recomendada para cargar en OTA</strong></span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#d0e4f7;border:1.5px solid #14427a"></div><span><strong>Ingreso neto estimado para el hotel</strong></span></div>
      </div>
      <button class="add-promo-btn" id="add-promo-${ch.key}">+ Crear nueva estrategia</button>
    </div>
    <div class="sections-grid" id="grid-${ch.key}"></div>
  `;
  return page;
}

// ── RENDER SECTIONS ──────────────────────────────────────────────────────────
function renderSections(ch) {
  const inp = document.getElementById('inp-'+ch.key);
  if (!inp) return;
  const inputVal = parseFloat(inp.value)||0;
  hotelBaseInputs[currentHotel] = hotelBaseInputs[currentHotel]||{};
  hotelBaseInputs[currentHotel][ch.key] = inputVal;

  const commission = ch._commission !== undefined ? ch._commission : ch.commission;
  const baseRates = getBaseRates(ch, inputVal);

  // Chips
  const brEl = document.getElementById('br-'+ch.key);
  if (brEl) brEl.innerHTML = ch.baseLabels.map((lbl,i)=>{
    const v = baseRates[ch.baseKeys[i]];
    return `<div class="base-rate-chip"><span class="chip-label">${lbl}</span><span class="chip-val">${fmt(v)}</span></div>`;
  }).join('');

  const grid = document.getElementById('grid-'+ch.key);
  if (!grid) return;
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = ch.gridCols ? `repeat(auto-fill,minmax(340px,1fr))` : 'repeat(auto-fill,minmax(480px,1fr))';

  ch.sections.forEach(sec => {
    grid.appendChild(buildSectionCard(ch, sec, baseRates, currentHotel));
  });
}

// ── SIDEBAR ──────────────────────────────────────────────────────────────────
function openSidebar() {
  document.getElementById('hotel-sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('open');
}
function closeSidebar() {
  document.getElementById('hotel-sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// ── SWITCH HOTEL ─────────────────────────────────────────────────────────────
function switchHotel(name) {
  currentHotel = name;
  document.querySelectorAll('.hotel-item').forEach(b=>b.classList.toggle('active', b.dataset.hotel===name));
  document.getElementById('hotel-badge').textContent = name;
  closeSidebar();
  // Load saved inputs for this hotel, re-render active channel
  const ch = CHANNELS.find(c=>c.key===currentChannelKey);
  if (ch) {
    const saved = (hotelBaseInputs[name]||{})[ch.key];
    const inp = document.getElementById('inp-'+ch.key);
    if (inp && saved!==undefined) inp.value = saved;
    renderSections(ch);
  }
}

// ── INIT ─────────────────────────────────────────────────────────────────────
function addTh(parent,text,style,colArr,colIdx){
  const th=document.createElement('th');
  th.contentEditable='true';
  th.textContent=text;
  if(style)th.setAttribute('style',style+';outline:none;');
  if(colArr!==undefined && colIdx!==undefined){
    th.addEventListener('blur',()=>{ colArr[colIdx]=th.textContent; });
    th.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();th.blur();} });
  }
  parent.appendChild(th);return th;
}
function addTd(parent,text,cls){const td=document.createElement('td');td.textContent=text;if(cls)td.className=cls;parent.appendChild(td);return td;}

function init() {
  HOTELS.forEach(h=>{hotelBaseInputs[h]={};CHANNELS.forEach(c=>{hotelBaseInputs[h][c.key]=240000;});});

  // Hotel sidebar list
  const hotelList = document.getElementById('hotel-list');
  HOTELS.forEach((hotel,i)=>{
    const btn=document.createElement('button');
    btn.className='hotel-item'+(i===0?' active':'');
    btn.dataset.hotel=hotel; btn.textContent=hotel;
    btn.addEventListener('click',()=>switchHotel(hotel));
    hotelList.appendChild(btn);
  });

  // Channel tabs & pages
  const tabsEl=document.getElementById('tabs');
  const pagesEl=document.getElementById('pages');
  CHANNELS.forEach((ch,idx)=>{
    const btn=document.createElement('button');
    btn.className='channel-tab'+(idx===0?' active':'');
    btn.dataset.key=ch.key; btn.textContent=ch.name;
    btn.addEventListener('click',()=>{
      currentChannelKey=ch.key;
      document.querySelectorAll('.channel-tab').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.channel-page').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('page-'+ch.key).classList.add('active');
      renderSections(ch);
    });
    tabsEl.appendChild(btn);

    const page=buildChannelPage(ch);
    if(idx===0)page.classList.add('active');
    pagesEl.appendChild(page);

    // Wire inputs
    document.getElementById('inp-'+ch.key).addEventListener('input',()=>renderSections(ch));
    document.getElementById('com-'+ch.key).addEventListener('input',e=>{
      ch._commission=(parseFloat(e.target.value)||0)/100;
      renderSections(ch);
    });
    document.getElementById('add-promo-'+ch.key).addEventListener('click',()=>{
      ch.sections.push({
        title:'NUEVA PROMOCIÓN', promoDefault:30,
        colHeaders:ch.sections[0]?.colHeaders||['Plan','Base','Promo','Tarifa ▼'],
        pairGroup:ch.sections[0]?.pairGroup,
        ptMerged:ch.sections[0]?.ptMerged||false,
        rows:ch.sections[0]?.ptMerged?undefined:[{label:'Nuevo Plan',base:ch.baseKeys[0],discounts:[0],planPct:0}],
        rowsSin:ch.sections[0]?.ptMerged?[{label:'Nuevo Plan',base:'std',discounts:[0],planPct:0}]:undefined,
        rowsCon:ch.sections[0]?.ptMerged?[{label:'Nuevo Plan',base:'stdC',discounts:[0],planPct:0}]:undefined,
      });
      renderSections(ch);
    });
  });

  currentChannelKey = CHANNELS[0].key;
  renderSections(CHANNELS[0]);
  document.getElementById('hotel-badge').textContent = HOTELS[0];
}

init();

// ── SAVE / RESTORE ───────────────────────────────────────────────────────────
function getFullState() {
  // Collect promoVals from all sections
  const promoValsMap = {};
  CHANNELS.forEach(ch => ch.sections.forEach(sec => {
    if (sec._promoVals) promoValsMap[sec._id] = {...sec._promoVals};
  }));
  return JSON.stringify({
    hotelBaseInputs: JSON.parse(JSON.stringify(hotelBaseInputs)),
    hotelPlanPcts:   JSON.parse(JSON.stringify(hotelPlanPcts)),
    hotelPaisPcts:   JSON.parse(JSON.stringify(hotelPaisPcts)),
    promoValsMap
  });
}

function restoreFullState(json) {
  try {
    const s = JSON.parse(json);
    // Restore base inputs
    Object.assign(hotelBaseInputs, s.hotelBaseInputs||{});
    Object.keys(s.hotelPlanPcts||{}).forEach(h => hotelPlanPcts[h] = s.hotelPlanPcts[h]);
    Object.keys(s.hotelPaisPcts||{}).forEach(h => hotelPaisPcts[h] = s.hotelPaisPcts[h]);
    // Restore promoVals
    CHANNELS.forEach(ch => ch.sections.forEach(sec => {
      if (s.promoValsMap[sec._id]) sec._promoVals = {...s.promoValsMap[sec._id]};
    }));
  } catch(e) { console.error('Restore error', e); }
}

let savedSnapshot = null;

document.getElementById('btn-global-save').addEventListener('click', ()=>{
  savedSnapshot = getFullState();
  localStorage.setItem('rmd_state', savedSnapshot);
  const st = document.getElementById('save-status');
  st.textContent = '✓ Guardado a las ' + new Date().toLocaleTimeString('es-CO');
  // Re-render current channel
  const ch = CHANNELS.find(c=>c.key===currentChannelKey);
  if (ch) renderSections(ch);
});

document.getElementById('btn-restore').addEventListener('click', ()=>{
  const snap = savedSnapshot || localStorage.getItem('rmd_state');
  if (!snap) { alert('No hay estado guardado aún.'); return; }
  restoreFullState(snap);
  const st = document.getElementById('save-status');
  st.textContent = '↩ Restaurado';
  const ch = CHANNELS.find(c=>c.key===currentChannelKey);
  if (ch) renderSections(ch);
});

// ── MODULE SWITCH ─────────────────────────────────────────────
function switchModule(mod) {
  const isOTB = mod === 'otb';
  // Nav buttons
  document.getElementById('nav-simulator').classList.toggle('active', !isOTB);
  document.getElementById('nav-otb').classList.toggle('active', isOTB);
  // Action bars
  document.getElementById('action-bar-simulator').style.display = isOTB ? 'none' : '';
  document.getElementById('action-bar-otb').style.display       = isOTB ? '' : 'none';
  // Modules
  document.getElementById('module-simulator').style.display = isOTB ? 'none' : '';
  document.getElementById('module-otb').style.display       = isOTB ? '' : 'none';
  // Init OTB on first open
  const otbPage = document.getElementById('page-otb');
  if (isOTB && !otbPage._initialized) { initOTB(otbPage); otbPage._initialized = true; }
}

// Load from localStorage on startup
(function loadOnStart(){
  const saved = localStorage.getItem('rmd_state');
  if (saved) { restoreFullState(saved); savedSnapshot = saved; }
})();

// ═══════════════════════════════════════════════════════════════
// PROMO CONFIG MODULE
// ═══════════════════════════════════════════════════════════════

const promoConfigHistory = [];
const pcfgSavedPerHotel = {}; // {hotel: {promoValsMap, planPcts, paisPcts}}
let pcfgActiveChannel = null;

function openPromoConfig() {
  document.getElementById('pcfg-overlay').classList.add('open');
  document.getElementById('pcfg-hotel-sub').textContent = 'Configurando para: ' + currentHotel;
  document.getElementById('pcfg-hotel-label').textContent = 'Hotel: ' + currentHotel;
  pcfgRenderTabs();
  pcfgRenderChannel(CHANNELS[0]);
}

function closePromoConfig() {
  document.getElementById('pcfg-overlay').classList.remove('open');
}

function pcfgRenderTabs() {
  const tabs = document.getElementById('pcfg-ch-tabs');
  tabs.innerHTML = '';
  CHANNELS.forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.className = 'pcfg-ch-tab' + (i === 0 ? ' active' : '');
    btn.textContent = ch.name;
    btn.addEventListener('click', () => {
      tabs.querySelectorAll('.pcfg-ch-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      pcfgRenderChannel(ch);
    });
    tabs.appendChild(btn);
  });
}

function pcfgPromoStatus(sec) {
  const saved = pcfgSavedPerHotel[currentHotel];
  const cur = getPromoVal(sec);
  if (!saved || saved.promoValsMap?.[sec._id] === undefined) return 'inherited';
  return saved.promoValsMap[sec._id] === cur ? 'saved' : 'pending';
}

function pcfgPlanStatus(sec, rowIdx) {
  const cur = hotelPlanPcts[currentHotel]?.[sec._id+'_'+rowIdx];
  if (cur === undefined) return 'inherited';
  const saved = pcfgSavedPerHotel[currentHotel];
  if (!saved) return 'pending';
  return saved.planPcts?.[sec._id+'_'+rowIdx] === cur ? 'saved' : 'pending';
}

function pcfgPaisStatus(sec) {
  const cur = hotelPaisPcts[currentHotel]?.[sec._id];
  if (cur === undefined) return 'inherited';
  const saved = pcfgSavedPerHotel[currentHotel];
  if (!saved) return 'pending';
  return saved.paisPcts?.[sec._id] === cur ? 'saved' : 'pending';
}

const PCFG_DOT_COLORS = { pending:'#f0a500', saved:'#1a6e3c', inherited:'#ccc' };
function pcfgDot(status) {
  return `<span class="pcfg-sdot" style="background:${PCFG_DOT_COLORS[status]||'#ccc'}" title="${status}"></span>`;
}

function pcfgSetNumStatus(el, status) {
  el.classList.remove('is-pending','is-saved');
  if (status !== 'inherited') el.classList.add('is-'+status);
}

function pcfgRenderChannel(ch) {
  pcfgActiveChannel = ch;
  const body = document.getElementById('pcfg-body');
  body.innerHTML = '';

  ch.sections.forEach(sec => {
    const secDiv = document.createElement('div');
    secDiv.className = 'pcfg-sec';

    // Section header — promo %
    const promoSt = pcfgPromoStatus(sec);
    const promoVal = getPromoVal(sec);
    const secHead = document.createElement('div');
    secHead.className = 'pcfg-sec-head';
    secHead.innerHTML = `
      <span class="pcfg-sec-title">${sec.title}</span>
      <div class="pcfg-promo-field">
        <label>% Promo</label>
        <input type="number" class="pcfg-num${promoSt!=='inherited'?' is-'+promoSt:''}"
               value="${promoVal}" min="0" max="100" step="1">
        <span style="font-size:.72rem;color:var(--gold-dark)">%</span>
        ${pcfgDot(promoSt)}
      </div>`;
    secDiv.appendChild(secHead);

    const promoIn = secHead.querySelector('input');
    promoIn.addEventListener('change', () => {
      const old = getPromoVal(sec);
      const nv = parseFloat(promoIn.value) || 0;
      setPromoVal(sec, nv);
      promoConfigHistory.push({ ts: new Date().toLocaleString('es-CO'), hotel: currentHotel, canal: ch.name, seccion: sec.title, campo: '% Promo', viejo: old, nuevo: nv });
      pcfgSetNumStatus(promoIn, pcfgPromoStatus(sec));
      const ac = CHANNELS.find(c=>c.key===currentChannelKey);
      if (ac && ac.key===ch.key) renderSections(ac);
    });

    // Rows table — plan % and país %
    const allRows = sec.rows || (sec.ptMerged ? [...(sec.rowsSin||[]),...(sec.rowsCon||[])] : []);
    const hasPlan = allRows.some(r => r.discounts && r.discounts.length > 1);
    const hasPais = allRows.some(r => r.promoAdd);

    if (allRows.length > 0 && (hasPlan || hasPais)) {
      const tbl = document.createElement('table');
      tbl.className = 'pcfg-rows-table';
      let thHtml = '<thead><tr><th>Estrategia</th>';
      if (hasPlan) thHtml += '<th>% Plan</th>';
      if (hasPais) thHtml += '<th>% País</th>';
      thHtml += '<th>Estado</th></tr></thead>';
      tbl.innerHTML = thHtml;

      const tbody = document.createElement('tbody');
      allRows.forEach((row, ri) => {
        const isPaisRow = !!row.promoAdd;
        const hasPlanRow = row.discounts && row.discounts.length > 1;
        const planSt = hasPlanRow ? pcfgPlanStatus(sec, ri) : null;
        const paisSt = isPaisRow ? pcfgPaisStatus(sec) : null;

        const tr = document.createElement('tr');
        let tdHtml = `<td class="pcfg-row-label">${row.label}${isPaisRow?'<span class="pcfg-pais-badge">país</span>':''}</td>`;

        if (hasPlan) {
          if (hasPlanRow) {
            const pv = Math.round(getPlanPct(sec, ri, row.planPct ?? (row.discounts[0]*100)));
            tdHtml += `<td><input type="number" class="pcfg-num${planSt&&planSt!=='inherited'?' is-'+planSt:''}" value="${pv}" min="0" max="100" step="1" data-field="plan" data-ri="${ri}">%</td>`;
          } else {
            tdHtml += '<td style="color:var(--gray3);font-size:.7rem">—</td>';
          }
        }

        if (hasPais) {
          if (isPaisRow) {
            const paisV = getPaisPct(sec);
            tdHtml += `<td><input type="number" class="pcfg-num${paisSt&&paisSt!=='inherited'?' is-'+paisSt:''}" value="${paisV}" min="0" max="100" step="1" data-field="pais">%</td>`;
          } else {
            tdHtml += '<td style="color:var(--gray3);font-size:.7rem">—</td>';
          }
        }

        const overallSt = [planSt,paisSt].filter(Boolean).reduce((a,b)=>a==='pending'||b==='pending'?'pending':a==='saved'||b==='saved'?'saved':'inherited','inherited');
        tdHtml += `<td>${pcfgDot(overallSt)}</td>`;
        tr.innerHTML = tdHtml;
        tbody.appendChild(tr);

        // Wire plan input
        if (hasPlanRow) {
          const planIn = tr.querySelector('input[data-field="plan"]');
          planIn.addEventListener('change', () => {
            const old = getPlanPct(sec, ri, row.planPct ?? (row.discounts[0]*100));
            const nv = parseFloat(planIn.value) || 0;
            setPlanPct(sec, ri, nv);
            promoConfigHistory.push({ ts: new Date().toLocaleString('es-CO'), hotel: currentHotel, canal: ch.name, seccion: sec.title, campo: `% Plan · ${row.label}`, viejo: Math.round(old), nuevo: nv });
            pcfgSetNumStatus(planIn, pcfgPlanStatus(sec, ri));
            const ac = CHANNELS.find(c=>c.key===currentChannelKey);
            if (ac && ac.key===ch.key) renderSections(ac);
          });
        }

        // Wire país input
        if (isPaisRow) {
          const paisIn = tr.querySelector('input[data-field="pais"]');
          paisIn.addEventListener('change', () => {
            const old = getPaisPct(sec);
            const nv = parseFloat(paisIn.value) || 0;
            setPaisPct(sec, nv);
            promoConfigHistory.push({ ts: new Date().toLocaleString('es-CO'), hotel: currentHotel, canal: ch.name, seccion: sec.title, campo: '% País', viejo: old, nuevo: nv });
            // Update all pais inputs in same section
            secDiv.querySelectorAll('input[data-field="pais"]').forEach(el => { el.value = nv; pcfgSetNumStatus(el, pcfgPaisStatus(sec)); });
            const ac = CHANNELS.find(c=>c.key===currentChannelKey);
            if (ac && ac.key===ch.key) renderSections(ac);
          });
        }
      });
      tbl.appendChild(tbody);
      secDiv.appendChild(tbl);
    }
    body.appendChild(secDiv);
  });
}

function pcfgSnapshotHotel(hotel) {
  const promoValsMap = {};
  CHANNELS.forEach(ch => ch.sections.forEach(sec => {
    if (sec._promoVals?.[hotel] !== undefined) promoValsMap[sec._id] = sec._promoVals[hotel];
  }));
  return {
    promoValsMap,
    planPcts: JSON.parse(JSON.stringify(hotelPlanPcts[hotel] || {})),
    paisPcts: JSON.parse(JSON.stringify(hotelPaisPcts[hotel] || {}))
  };
}

function pcfgSaveHotel() {
  pcfgSavedPerHotel[currentHotel] = pcfgSnapshotHotel(currentHotel);
  localStorage.setItem('rmd_state', getFullState());
  if (pcfgActiveChannel) pcfgRenderChannel(pcfgActiveChannel);
  const ts = new Date().toLocaleTimeString('es-CO');
  document.getElementById('pcfg-foot-status').textContent = `✓ Guardado para ${currentHotel} — ${ts}`;
  document.getElementById('save-status').textContent = `✓ Guardado a las ${ts}`;
}

function pcfgRestoreHotel() {
  const saved = pcfgSavedPerHotel[currentHotel];
  if (!saved) {
    const snap = localStorage.getItem('rmd_state');
    if (!snap) { alert('No hay configuración guardada para este hotel.'); return; }
    restoreFullState(snap);
  } else {
    CHANNELS.forEach(ch => ch.sections.forEach(sec => {
      if (saved.promoValsMap[sec._id] !== undefined) {
        if (!sec._promoVals) sec._promoVals = {};
        sec._promoVals[currentHotel] = saved.promoValsMap[sec._id];
      }
    }));
    hotelPlanPcts[currentHotel] = JSON.parse(JSON.stringify(saved.planPcts));
    hotelPaisPcts[currentHotel] = JSON.parse(JSON.stringify(saved.paisPcts));
  }
  if (pcfgActiveChannel) pcfgRenderChannel(pcfgActiveChannel);
  const ac = CHANNELS.find(c=>c.key===currentChannelKey);
  if (ac) renderSections(ac);
  document.getElementById('pcfg-foot-status').textContent = `↩ Restaurado para ${currentHotel}`;
}

function pcfgGlobalSave() {
  HOTELS.forEach(h => { pcfgSavedPerHotel[h] = pcfgSnapshotHotel(h); });
  localStorage.setItem('rmd_state', getFullState());
  if (pcfgActiveChannel) pcfgRenderChannel(pcfgActiveChannel);
  const ts = new Date().toLocaleTimeString('es-CO');
  document.getElementById('pcfg-foot-status').textContent = `✓ Todos los hoteles guardados — ${ts}`;
  document.getElementById('save-status').textContent = `✓ Guardado global a las ${ts}`;
}

function pcfgToggleHistory() {
  const wrap = document.getElementById('pcfg-hist-wrap');
  wrap.classList.toggle('open');
  if (wrap.classList.contains('open')) pcfgRenderHistory();
}

function pcfgRenderHistory() {
  const content = document.getElementById('pcfg-hist-content');
  if (!promoConfigHistory.length) {
    content.innerHTML = '<p style="font-size:.74rem;color:var(--gray3);text-align:center;padding:16px">No hay cambios registrados en esta sesión.</p>';
    return;
  }
  const rows = [...promoConfigHistory].reverse().slice(0, 100);
  content.innerHTML = `<table class="pcfg-hist-table">
    <thead><tr><th>Hora</th><th>Hotel</th><th>Canal</th><th>Sección</th><th>Campo</th><th>Anterior</th><th>Nuevo</th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td>${r.ts}</td><td>${r.hotel}</td><td>${r.canal}</td><td>${r.seccion}</td>
      <td>${r.campo}</td><td style="color:#c00">${r.viejo}%</td><td style="color:#1a6e3c">${r.nuevo}%</td>
    </tr>`).join('')}</tbody></table>`;
}

function pcfgExportExcel() {
  if (typeof XLSX === 'undefined') { alert('SheetJS no disponible'); return; }
  const wb = XLSX.utils.book_new();
  CHANNELS.forEach(ch => {
    const data = [['Sección','% Promo','Estrategia','% Plan','% País','Estado']];
    ch.sections.forEach(sec => {
      const pv = getPromoVal(sec);
      const rows = sec.rows || (sec.ptMerged ? [...(sec.rowsSin||[]),...(sec.rowsCon||[])] : []);
      if (!rows.length) { data.push([sec.title, pv+'%','','','', pcfgPromoStatus(sec)]); return; }
      rows.forEach((row, ri) => {
        const planV = (row.discounts&&row.discounts.length>1) ? Math.round(getPlanPct(sec,ri,row.planPct??(row.discounts[0]*100)))+'%' : '';
        const paisV = row.promoAdd ? getPaisPct(sec)+'%' : '';
        const st = [pcfgPlanStatus(sec,ri),row.promoAdd?pcfgPaisStatus(sec):null].filter(Boolean).includes('pending')?'pendiente':'guardado';
        data.push([ri===0?sec.title:'', ri===0?pv+'%':'', row.label, planV, paisV, st]);
      });
    });
    const ws = XLSX.utils.aoa_to_sheet(data);
    XLSX.utils.book_append_sheet(wb, ws, ch.name.substring(0,31));
  });
  if (promoConfigHistory.length) {
    const hd = [['Hora','Hotel','Canal','Sección','Campo','Anterior','Nuevo']];
    promoConfigHistory.forEach(r=>hd.push([r.ts,r.hotel,r.canal,r.seccion,r.campo,r.viejo+'%',r.nuevo+'%']));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(hd), 'Historial');
  }
  XLSX.writeFile(wb, `config_promociones_${currentHotel.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

const OTB_STATE = {
  beforeData: null,
  afterData: null,
  beforeCols: null,
  afterCols: null,
  comparison: null,
  charts: {},
  history: JSON.parse(localStorage.getItem('otb_history')||'[]')
};

const COL_ALIASES = {
  date:     ['fecha','date','día','day','stay date','arrival date','periodo'],
  occ:      ['ocupacion','ocupación','occupancy','occ','occ %','% ocupacion','% occ'],
  rooms:    ['habitaciones vendidas','rooms sold','sold rooms','room nights','rn','noches vendidas','hab vendidas','hab. vendidas'],
  adr:      ['adr','average daily rate','tarifa promedio','tarifa media','avg rate'],
  revpar:   ['revpar','revenue per available room','revpar neto','revpar bruto'],
  revenue:  ['revenue','room revenue','ingresos','venta alojamiento','produccion','producción'],
  hotel:    ['hotel','propiedad','property']
};

function detectColumn(headers, field) {
  const aliases = COL_ALIASES[field] || [];
  for (const h of headers) {
    const hl = h.toLowerCase().trim();
    if (aliases.some(a => hl.includes(a) || a.includes(hl))) return h;
  }
  return null;
}

function parseExcelDate(val) {
  if (!val && val !== 0) return null;
  if (typeof val === 'number') {
    const d = new Date(Math.round((val - 25569) * 86400 * 1000));
    if (isNaN(d.getTime())) return null;
    return d.toISOString().split('T')[0];
  }
  const s = String(val).trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  const m1 = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m1) return m1[3]+'-'+m1[2].padStart(2,'0')+'-'+m1[1].padStart(2,'0');
  const m2 = s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})/);
  if (m2) return m2[3]+'-'+m2[1].padStart(2,'0')+'-'+m2[2].padStart(2,'0');
  return null;
}

function cleanNum(val) {
  if (val === null || val === undefined || val === '') return null;
  if (typeof val === 'number') return val;
  const s = String(val).replace(/[$,\s]/g,'').replace(/[^0-9.\-]/g,'');
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function normalizeOcc(val) {
  const n = cleanNum(val);
  if (n === null) return null;
  return n > 1 ? n : n * 100;
}

function parseFileData(wb, mapping) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const raw = XLSX.utils.sheet_to_json(ws, {defval:''});
  return raw.map((r,i) => ({
    _idx: i,
    date:    parseExcelDate(r[mapping.date]),
    occ:     normalizeOcc(r[mapping.occ]),
    rooms:   cleanNum(r[mapping.rooms]),
    adr:     cleanNum(r[mapping.adr]),
    revpar:  cleanNum(r[mapping.revpar]),
    revenue: cleanNum(r[mapping.revenue]),
    hotel:   mapping.hotel ? r[mapping.hotel] : null,
    _raw:    r
  })).filter(r => r.date);
}

function compareOTB(before, after) {
  const bMap = {};
  before.forEach(r => { if (r.date) bMap[r.date] = r; });
  const aMap = {};
  after.forEach(r => { if (r.date) aMap[r.date] = r; });
  const allDates = [...new Set([...Object.keys(bMap), ...Object.keys(aMap)])].sort();

  return allDates.map(date => {
    const b = bMap[date];
    const a = aMap[date];
    if (!b) return { date, status:'new', b:null, a, note:'Nueva fecha en DESPUÉS' };
    if (!a) return { date, status:'missing', b, a:null, note:'Sin dato en DESPUÉS' };

    const diff = (af, bf) => {
      if (af === null || bf === null) return { abs: null, pct: null, dir: 'same' };
      const abs = af - bf;
      const pct = bf !== 0 ? (abs/bf)*100 : null;
      const tol = 0.5;
      const dir = Math.abs(abs) < tol ? 'same' : abs > 0 ? 'up' : 'down';
      return { abs, pct, dir };
    };

    const occ   = diff(a.occ,   b.occ);
    const rooms = diff(a.rooms, b.rooms);
    const adr   = diff(a.adr,   b.adr);
    const rev   = diff(a.revpar, b.revpar);

    const ups   = [occ,rooms,rev].filter(x=>x.dir==='up').length;
    const downs = [occ,rooms,rev].filter(x=>x.dir==='down').length;
    let status = 'stable';
    if (ups >= 2) status = 'positive';
    else if (downs >= 2) status = 'negative';
    else if (ups > 0 && downs > 0) status = 'mixed';

    return { date, status, b, a, occ, rooms, adr, revpar: rev };
  });
}

function buildSummaryMetrics(rows) {
  const valid = rows.filter(r => r.b && r.a);
  const up    = rows.filter(r => r.status === 'positive').length;
  const down  = rows.filter(r => r.status === 'negative').length;
  const stable= rows.filter(r => r.status === 'stable' || r.status === 'mixed').length;

  const avg = (field) => {
    const vals = valid.map(r => r[field] && r[field].abs !== undefined ? r[field].abs : null).filter(v => v !== null);
    return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
  };

  const general = (() => {
    const overallUps = rows.length ? up / rows.length : 0;
    if (overallUps > 0.6) return 'Positivo';
    if (overallUps < 0.3 && down > up) return 'Negativo';
    if (up > 0 && down > 0) return 'Mixto';
    return 'Estable';
  })();

  return { total: rows.length, up, down, stable, avgOcc: avg('occ'), avgRooms: avg('rooms'), avgAdr: avg('adr'), avgRevpar: avg('revpar'), general };
}

function generateRecommendations(metrics, rows) {
  const recs = [];
  const { general, avgOcc, avgRevpar, up, down } = metrics;

  if (general === 'Positivo' || avgOcc > 2) {
    recs.push({ type:'positive', title:'Oportunidad de subida tarifaria', body:'La ocupación y el RevPAR muestran crecimiento. Se recomienda evaluar incremento tarifario gradual entre 3% y 8% en las fechas con mayor presión de demanda.', priority:'high' });
    recs.push({ type:'positive', title:'Aplicar restricciones de estancia', body:'Con alta ocupación se sugiere activar mínimos de 2 o 3 noches en fechas pico para optimizar el mix de estadía y proteger el inventario.', priority:'medium' });
  }
  if (general === 'Negativo' || avgOcc < -2) {
    recs.push({ type:'negative', title:'Revisar competitividad tarifaria', body:'Se detecta caída en ocupación y habitaciones vendidas. Se recomienda revisar paridad de canales, activar promociones tácticas y mejorar visibilidad OTA.', priority:'high' });
    recs.push({ type:'negative', title:'Activar promociones de demanda', body:'Considerar: tarifa No Reembolsable con descuento, promoción móvil, oferta por país o compra anticipada para las fechas afectadas.', priority:'high' });
  }
  if (general === 'Mixto') {
    recs.push({ type:'warning', title:'Gestión diferenciada por fecha', body:'El comportamiento es mixto. Se recomienda analizar fecha por fecha: subir tarifa en días con alta ocupación y activar promociones en días con baja tracción.', priority:'medium' });
  }

  const critDown = rows.filter(r => r.status === 'negative').slice(0,5);
  critDown.forEach(r => {
    recs.push({ type:'negative', title:'Fecha crítica: '+r.date, body:'Ocupación: '+(r.b&&r.b.occ!==null?r.b.occ.toFixed(1):'N/A')+'% → '+(r.a&&r.a.occ!==null?r.a.occ.toFixed(1):'N/A')+'%. RevPAR: '+fmtCOP(r.b&&r.b.revpar)+' → '+fmtCOP(r.a&&r.a.revpar)+'. Acción: revisar tarifa y activar promoción táctica.', priority:'high' });
  });

  const topUp = rows.filter(r => r.status === 'positive').slice(0,3);
  topUp.forEach(r => {
    recs.push({ type:'positive', title:'Fecha destacada: '+r.date, body:'Crecimiento positivo. Se recomienda mantener o incrementar gradualmente la tarifa para capitalizar la demanda.', priority:'low' });
  });

  return recs;
}

function fmtCOP(n) {
  if (n === null || n === undefined) return 'N/D';
  return '$ ' + Math.round(n).toLocaleString('es-CO');
}
function fmtPct(n, decimals) {
  decimals = decimals !== undefined ? decimals : 1;
  if (n === null || n === undefined) return 'N/D';
  return (n > 0 ? '+' : '') + n.toFixed(decimals) + '%';
}
function dirIcon(dir) {
  if (dir === 'up')   return '<span class="ind-up">⬆</span>';
  if (dir === 'down') return '<span class="ind-down">⬇</span>';
  return '<span class="ind-same">⚫</span>';
}

function otbShowError(msg) {
  const el = document.getElementById('otb-errors');
  if (!el) return;
  el.innerHTML = '<div class="otb-alert red">⚠ ' + msg + '</div>';
  setTimeout(function() { if(el) el.innerHTML=''; }, 5000);
}

function otbHandleDrop(e, side) {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file) return;
  otbProcessFile(file, side);
}

function otbLoadFile(input, side) {
  if (!input.files[0]) return;
  otbProcessFile(input.files[0], side);
}

function otbClearFile(side) {
  OTB_STATE[side+'Data'] = null;
  OTB_STATE[side+'Cols'] = null;
  const fnEl = document.getElementById('otb-fname-'+side);
  const dropEl = document.getElementById('otb-drop-'+side);
  if (fnEl) fnEl.textContent = 'Sin archivo cargado';
  if (dropEl) dropEl.classList.remove('has-file');
  const mapArea = document.getElementById('otb-mapping-area');
  const edArea = document.getElementById('otb-editor-area');
  const cmpBtn = document.getElementById('otb-compare-btn-area');
  if (mapArea) mapArea.innerHTML = '';
  if (edArea) edArea.innerHTML = '';
  if (cmpBtn) cmpBtn.style.display = 'none';
}

function otbProcessFile(file, side) {
  const name = file.name.toLowerCase();
  if (name.match(/\.(png|jpg|jpeg)$/)) {
    otbShowError('La lectura automática de imágenes estará disponible en Fase 2. Cargue archivos Excel o CSV.');
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      let wb;
      if (name.endsWith('.csv')) {
        wb = XLSX.read(e.target.result, {type:'string'});
      } else {
        wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
      }
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, {defval:'',header:1});
      const headers = (raw[0] || []).map(function(h){ return String(h).trim(); });

      const mapping = {};
      Object.keys(COL_ALIASES).forEach(function(field) {
        const found = detectColumn(headers, field);
        if (found) mapping[field] = found;
      });

      OTB_STATE[side+'WB'] = wb;
      OTB_STATE[side+'Headers'] = headers;
      OTB_STATE[side+'Mapping'] = mapping;

      const fnEl = document.getElementById('otb-fname-'+side);
      const dropEl = document.getElementById('otb-drop-'+side);
      if (fnEl) fnEl.textContent = '✓ ' + file.name;
      if (dropEl) dropEl.classList.add('has-file');

      otbShowMappingUI();
    } catch(err) {
      otbShowError('Error al leer el archivo: ' + err.message);
    }
  };
  if (name.endsWith('.csv')) reader.readAsText(file);
  else reader.readAsArrayBuffer(file);
}

function otbShowMappingUI() {
  const area = document.getElementById('otb-mapping-area');
  const sides = [
    { key:'before', label:'OTB ANTES' },
    { key:'after',  label:'OTB DESPUÉS' }
  ].filter(function(s){ return OTB_STATE[s.key+'Headers']; });

  if (!sides.length) { if(area) area.innerHTML=''; return; }

  let html = '<div class="otb-card"><div class="otb-card-title">Mapeo de columnas</div>';
  sides.forEach(function(s) {
    const headers = OTB_STATE[s.key+'Headers'];
    const mapping = OTB_STATE[s.key+'Mapping'];
    const fields = [
      { key:'date',    label:'Fecha *' },
      { key:'occ',     label:'Ocupación %' },
      { key:'rooms',   label:'Hab. vendidas' },
      { key:'adr',     label:'ADR' },
      { key:'revpar',  label:'RevPAR' },
      { key:'revenue', label:'Ingresos' },
      { key:'hotel',   label:'Hotel' }
    ];
    html += '<div style="margin-bottom:12px"><strong style="font-size:.78rem;color:var(--gold-dark)">'+s.label+'</strong><div class="otb-map-grid">';
    fields.forEach(function(f) {
      const opts = [''].concat(headers).map(function(h){ return '<option value="'+h+'"'+(mapping[f.key]===h?' selected':'')+'>'+( h||'— No mapear —')+'</option>'; }).join('');
      html += '<div class="otb-map-row"><label>'+f.label+'</label><select data-side="'+s.key+'" data-field="'+f.key+'" onchange="otbUpdateMapping(this)">'+opts+'</select></div>';
    });
    html += '</div></div>';
  });
  html += '</div>';

  if (OTB_STATE.beforeHeaders && OTB_STATE.afterHeaders) {
    html += '<div style="text-align:center;padding:8px 0"><button class="otb-btn primary" onclick="otbApplyMapping()">✓ Aplicar mapeo y previsualizar datos</button></div>';
  }
  if (area) area.innerHTML = html;
}

function otbUpdateMapping(sel) {
  const side = sel.dataset.side;
  const field = sel.dataset.field;
  if (!OTB_STATE[side+'Mapping']) OTB_STATE[side+'Mapping'] = {};
  OTB_STATE[side+'Mapping'][field] = sel.value || null;
}

function otbApplyMapping() {
  if (!OTB_STATE.beforeMapping || !OTB_STATE.beforeMapping.date) { otbShowError('Mapee la columna Fecha para OTB ANTES'); return; }
  if (!OTB_STATE.afterMapping  || !OTB_STATE.afterMapping.date)  { otbShowError('Mapee la columna Fecha para OTB DESPUÉS'); return; }

  OTB_STATE.beforeData = parseFileData(OTB_STATE.beforeWB, OTB_STATE.beforeMapping);
  OTB_STATE.afterData  = parseFileData(OTB_STATE.afterWB,  OTB_STATE.afterMapping);

  if (!OTB_STATE.beforeData.length) { otbShowError('No se encontraron filas con fechas válidas en ANTES'); return; }
  if (!OTB_STATE.afterData.length)  { otbShowError('No se encontraron filas con fechas válidas en DESPUÉS'); return; }

  otbShowEditorUI();
  const cmpBtn = document.getElementById('otb-compare-btn-area');
  if (cmpBtn) cmpBtn.style.display = 'block';
}

    + '</div>'
