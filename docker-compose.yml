services:
  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      PORT: 3000
      FRONTEND_ORIGIN: https://${DOMAIN}
    restart: unless-stopped
    expose:
      - "3000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      DOMAIN: ${DOMAIN}
    restart: unless-stopped
    ports:
      - "${FRONTEND_HTTP_PORT:-80}:80"
      - "${FRONTEND_HTTPS_PORT:-443}:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
